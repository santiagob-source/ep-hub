function et_save(id) {
  var modal = document.querySelector(".modal");
  if (!modal) return;
  var form = modal.querySelector("form");
  var data = Object.fromEntries(new FormData(form).entries());
  var record = state.tasks.find(function(t){return t.id===id;}) || {id:id,done:false};
  var updated = Object.assign({},record,data);
  var idx = state.tasks.findIndex(function(t){return t.id===id;});
  if (idx>=0) state.tasks[idx]=updated; else state.tasks.push(updated);
  if (data.due) {
    var due = new Date(data.due).getTime();
    var delay = due - Date.now();
    if (delay>0 && delay<86400000) {
      setTimeout(function(){ showNotification("Tarea: "+data.title, data.linkedTo||""); }, delay);
    }
  }
  // Sync to calendar if date/time set
  if (data.due) {
    var dueDate = new Date(data.due);
    var days = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    var dayName = days[dueDate.getDay()];
    // Map to calendar days (Mon-Fri only)
    var calDays = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
    if (calDays.includes(dayName)) {
      var timeStr = dueDate.getHours().toString().padStart(2,"0") + ":" + dueDate.getMinutes().toString().padStart(2,"0");
      // Check if already a calendar event for this task
      var existingEvt = state.events.find(function(e){return e.taskId===id;});
      if (!existingEvt) {
        state.events.push({id:uid(), taskId:id, title:data.title, day:dayName, time:timeStr, due:data.due});
      } else {
        existingEvt.title = data.title;
        existingEvt.day = dayName;
        existingEvt.time = timeStr;
        existingEvt.due = data.due;
      }
      saveState();
      showToast("Tarea guardada y sincronizada con el calendario");
    }
  }
  saveState(); modal.remove(); render(); showToast("Tarea guardada");
}

function acp_save(jobId, stage) {
  var job = state.jobs.find(function(j){return j.id===jobId;});
  if (!job) return;
  var name = (document.getElementById("acp-n-"+jobId)||{value:""}).value.trim() ||
             (document.getElementById("acp-inp-"+jobId)||{value:""}).value.trim();
  if (!name) { showToast("El nombre es obligatorio"); return; }

  job.pipeline = job.pipeline||[];
  var existing = job.pipeline.find(function(p){return normalize(p.name)===normalize(name);});
  if (existing) {
    existing.stage = stage;
  } else {
    job.pipeline.push({
      name: name, stage: stage, label: "En proceso",
      spec: (document.getElementById("acp-s-"+jobId)||{value:""}).value,
      tel: (document.getElementById("acp-t-"+jobId)||{value:""}).value,
      email: (document.getElementById("acp-e-"+jobId)||{value:""}).value,
      linkedin: (document.getElementById("acp-l-"+jobId)||{value:""}).value,
      cv: (document.getElementById("acp-c-"+jobId)||{value:""}).value,
    });
  }

  var cand = state.candidates.find(function(c){return normalize(c.name)===normalize(name);});
  if (!cand) {
    cand = {id:uid(), name:name, phone:(document.getElementById("acp-t-"+jobId)||{value:""}).value,
      email:(document.getElementById("acp-e-"+jobId)||{value:""}).value,
      specialty:(document.getElementById("acp-s-"+jobId)||{value:""}).value||job.title,
      location:"", status:stage, cv:(document.getElementById("acp-c-"+jobId)||{value:""}).value,
      linkedin:(document.getElementById("acp-l-"+jobId)||{value:""}).value, notes:"",
      jobs:job.title+" - "+job.client};
    state.candidates.push(cand);
  } else {
    if (!normalize(cand.jobs||"").includes(normalize(job.title)))
      cand.jobs = [cand.jobs, job.title+" - "+job.client].filter(Boolean).join(", ");
  }

  saveState();
  document.querySelector(".modal").remove();
  renderJobDetail(jobId);
  showToast("Candidato anadido");
}

function editGoal(id) {

function editFocusActivity(id) {
  const record = state.pomodoro.activities.find((item) => item.id === id) || { id: uid(), name: "", minutes: 25 };
  openModal({
    title: record.name ? "Editar actividad" : "Nueva actividad",
    fields: [
      ["name", "Actividad"],
      ["minutes", "Minutos", "number"],
    ],
    values: record,
    onSave: (data) => {
      const updated = { ...record, name: data.name || "Actividad", minutes: Math.max(Number(data.minutes || 1), 1) };
      state.pomodoro.activities ||= [];
      const index = state.pomodoro.activities.findIndex((item) => item.id === id);
      if (index >= 0) state.pomodoro.activities[index] = updated;
      else state.pomodoro.activities.push(updated);
      state.pomodoro.mode = updated.name;
      state.pomodoro.minutes = updated.minutes;
      state.pomodoro.remaining = updated.minutes * 60;
      state.pomodoro.running = false;
    },
  });
}

      "<div class='panel-header'><h2 class='panel-title'>Importar datos</h2>" +

        "<button class='ghost-button' type='button' data-close-modal>Cancelar</button>" +
        "<button class='primary-button' id='import-btn-confirm'>Importar y cargar</button>" +
      "</div>" +
    "</div>";
  document.body.appendChild(modal);
  document.getElementById("import-btn-confirm").addEventListener("click", function() {
    var txt = document.getElementById("import-json-txt").value.trim();
    var errEl = document.getElementById("import-error");
    if (!txt) { errEl.style.display="block"; errEl.textContent="Pega el JSON primero."; return; }
    try {
      var parsed;
      // Handle both formats: raw state JSON or the localStorage wrapper format
      var raw = JSON.parse(txt);
      if (raw["ep-hub-v14"]) {
        parsed = JSON.parse(raw["ep-hub-v14"]);
      } else if (raw["expansion-recruiter-hub-v3"]) {
        parsed = JSON.parse(raw["expansion-recruiter-hub-v3"]);
      } else if (raw.candidates && raw.clients) {
        parsed = raw;
      } else {
        throw new Error("Formato no reconocido");
      }
      // Validate minimum structure
      if (!parsed.candidates || !parsed.clients) throw new Error("El JSON no tiene la estructura correcta");
      // Merge keeping new fields
      parsed.forecast = parsed.forecast || [];
      parsed.fichajes = parsed.fichajes || [];
      parsed.notas = parsed.notas || state.notas;
      parsed.dashWidgets = parsed.dashWidgets || state.dashWidgets;
      state = parsed;
      saveState();
      modal.remove();
      renderNav();
      setView("dashboard");
      showToast("Datos importados correctamente!");
    } catch(e) {
      errEl.style.display="block";
      errEl.textContent = "Error: " + e.message + ". Asegurate de pegar el JSON completo.";
    }
  });
  modal.addEventListener("click", function(e){ if(e.target.matches("[data-close-modal]")||e.target===modal) modal.remove(); });
}

    var file = fileInput.files[0];
    if (!file) return;
    if (file.size > 5000000) { showToast("Archivo muy grande (max 5MB)"); return; }
    var txtInput = document.getElementById(fileId + "-txt");
    var statusEl = document.getElementById(fileId + "-status");
    var reader = new FileReader();
    reader.onload = function(e) {
      // Store in temp so when record saved we attach it
      window._pendingCV = {name: file.name, data: e.target.result, type: file.type};
      if (txtInput) txtInput.value = file.name;
      if (statusEl) { statusEl.style.display="block"; statusEl.textContent = "✓ " + file.name + " listo para guardar"; }

}

    if (indicator) indicator.textContent = "✓ Guardado";
    if (indicator) indicator.style.color = "#166534";
    setTimeout(function(){
      if (bar) bar.style.display = "none";
    }, 1500);
    showToast("Nota guardada");
  }
}

    return '<div class="prop-fee-row">' + prop_buildFeeRowHTML(i, l) + '</div>';
  }).join('');

      '<input class="fee-garantia" placeholder="3 meses" value="'+(l.garantia||'').replace(/"/g,'&quot;')+'" style="width:100%;height:32px;padding:0 8px;border:1.5px solid #CBD5E1;border-radius:7px;font-family:inherit;font-size:12px"/></div>' +

  '</div>';
}

function prop_save(modal, client, propIdx, existing) {
  var form = modal.querySelector('.panel-body');
  function val(name) {
    var el = form.querySelector('[name="'+name+'"]');
    return el ? el.value.trim() : '';
  }
  // Collect fee lines
  var feeRows = form.querySelectorAll('.prop-fee-row');
  var feeLines = [];
  feeRows.forEach(function(row) {
    var perfil = (row.querySelector('.fee-perfil')||{value:''}).value.trim();
    if (!perfil) return;
    feeLines.push({
      perfil: perfil,
      tipoFee: (row.querySelector('.fee-tipo')||{value:'porcentaje'}).value,
      valor: (row.querySelector('.fee-valor')||{value:''}).value.trim(),
      garantia: (row.querySelector('.fee-garantia')||{value:''}).value.trim(),
      notas: ''
    });
  });

  var updated = Object.assign({}, existing, {
    date: val('p_date') || existing.date,
    status: "generada",
    clientName: val('p_clientName'),
    razonSocial: val('p_razonSocial'),
    cif: val('p_cif'),
    direccion: val('p_direccion'),
    contacto: val('p_contacto'),
    emailCliente: val('p_emailCliente'),
    consultorName: val('p_consultor'),
    consultorEmail: val('p_consultorEmail'),
    consultorTel: val('p_consultorTel'),
    propTipo: (function(){ var r = form.querySelector('[name="p_tipo"]:checked'); return r ? r.value : 'completa'; })(),
    validity: val('p_validity'),
    exclusivity: val('p_exclusivity'),
    feeLines: feeLines,
    paymentTerms: {
      modalidad: val('p_pay_modalidad'),
      emision: val('p_pay_emision'),
      vencimiento: val('p_pay_vencimiento'),
      medio: val('p_pay_medio'),
      notas: val('p_pay_notas')
    }
  });
  updated.generatedContent = prop_generateHTML(updated, client, updated.propTipo || 'completa');

  if (!client.proposals) client.proposals = [];
  if (propIdx !== null && propIdx !== undefined) {
    client.proposals[propIdx] = updated;
  } else {
    client.proposals.push(updated);
  }
  saveState();
  modal.remove();
  openDetail('client', client.id, true);
  showToast('Propuesta guardada');
  // Auto-preview
  setTimeout(function(){ prop_view(client.id, client.proposals.length - (propIdx === null ? 1 : 0)); }, 200);

function prop_generateHTML(p, client, tipo) {
  tipo = tipo || 'completa'; // 'simple' or 'completa'

  var feeTable = '';
  if (p.feeLines && p.feeLines.length) {
    feeTable = '<table style="width:100%;border-collapse:collapse;margin-top:10px">' +
      '<thead><tr style="background:#0A1F5C;color:#fff">' +
        '<th style="padding:8px 12px;text-align:left;font-size:12px;font-weight:700">Perfil</th>' +
        '<th style="padding:8px 12px;text-align:left;font-size:12px;font-weight:700">Honorarios</th>' +
        '<th style="padding:8px 12px;text-align:left;font-size:12px;font-weight:700">Garantía</th>' +
      '</tr></thead><tbody>' +
      p.feeLines.map(function(l, i){
        var bg = i%2===0 ? '#F8FAFC' : '#fff';
        return '<tr style="background:'+bg+'">' +
          '<td style="padding:7px 12px;font-size:12px;border-bottom:1px solid #E2E8F0">'+l.perfil+'</td>' +
          '<td style="padding:7px 12px;font-size:12px;font-weight:700;border-bottom:1px solid #E2E8F0;color:#0A1F5C">'+l.valor+'</td>' +
          '<td style="padding:7px 12px;font-size:12px;border-bottom:1px solid #E2E8F0">'+l.garantia+'</td></tr>';
      }).join('') + '</tbody></table>';
  }

  var pt = p.paymentTerms || {};
  var payTable = '<table style="width:100%;border-collapse:collapse;margin-top:10px">' +
    ['Modalidad de selección|'+pt.modalidad,
     'Emisión de factura|'+pt.emision,
     'Vencimiento de factura|'+pt.vencimiento,
     'Medio de pago|'+pt.medio
    ].map(function(row, i){
      var parts = row.split('|');
      var bg = i%2===0 ? '#F8FAFC' : '#fff';
      return '<tr style="background:'+bg+'"><td style="padding:7px 14px;font-size:12px;border:1px solid #E2E8F0;width:240px;color:#64748B">'+parts[0]+'</td>' +
        '<td style="padding:7px 14px;font-size:12px;font-weight:600;border:1px solid #E2E8F0">'+((parts[1]||'')+'').trim()+'</td></tr>';
    }).join('') + '</table>' +
    (pt.notas ? '<p style="font-size:12px;color:#64748B;margin-top:6px">'+pt.notas+'</p>' : '');

  // SVG logo (blue arrow + Expansion People text)

  var logo = '<img src="' + logoSrc + '" alt="Expansion People" style="height:90px;object-fit:contain;display:block"/>';

  var condGenerales = tipo === 'completa' ? `
    <h2>CONDICIONES GENERALES</h2>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">DEFINICIONES</h3>
    <p style="font-size:12px">
    <strong>a) Candidato:</strong> persona incluida en un proceso de selección, reclutamiento o evaluación.<br>
    <strong>b) Candidato Aceptado:</strong> Candidato que recibe oferta laboral por parte del CLIENTE.<br>
    <strong>c) Candidato Presentado:</strong> persona seleccionada por EXPANSION para su presentación al CLIENTE.<br>
    <strong>d) Fee de Cancelación:</strong> Porcentaje aplicado sobre la factura estimada por el perfil (teniendo en cuenta el salario mínimo de fijo + variable que se contempla para esa vacante). Se aplica solamente si se cancela la posición a la consultora, una vez iniciada la fase de entrevistas entre cliente y candidato.<br>
    <strong>e) Finalización del proceso:</strong> fecha en la que el Candidato Aceptado acepta una oferta laboral firme de incorporación del CLIENTE, independientemente de la fecha en la que se produzca.<br>
    <strong>f) Honorarios:</strong> porcentaje sobre el Salario Bruto Anual (fijo + variable) del candidato aceptado que se emplea para el cálculo del precio del servicio que presta EXPANSION o, en su caso, importe concreto en euros.<br>
    <strong>g) Incorporación del Candidato:</strong> momento en el que el Candidato Seleccionado comienza su relación laboral con el CLIENTE.<br>
    <strong>h) Informes:</strong> documentación escrita sobre el Candidato Seleccionado, que se suministra por EXPANSION PEOPLE en virtud de este Contrato.<br>
    <strong>i) Propuesta de Colaboración:</strong> documento que contenga el ofrecimiento comercial de EXPANSION PEOPLE al CLIENTE y que cumplimenta las presentes Condiciones Generales.<br>
    <strong>j) Perfil:</strong> conjunto de habilidades, competencias, o características que deben reunir los Candidatos, y que aceptada por ambas partes no podrá ser modificada o alterada sin modificar o alterar la Propuesta de Colaboración.<br>
    <strong>k) Salario Bruto Anual:</strong> suma del salario fijo anual y las compensaciones variables ofertadas al candidato final.
    </p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">OBJETO DEL CONTRATO</h3>
    <p style="font-size:12px">La finalidad de la Propuesta de Colaboración y de las presentes Condiciones Generales es regular el Servicio de búsqueda y selección de Candidato para un Perfil dado por el CLIENTE o evaluación competencial de perfiles según necesidades indicadas por el Cliente.</p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">CONDICIONES DE PAGO</h3>
    <p style="font-size:12px">a) En caso de ser los Honorarios a éxito, la facturación se realizará en el momento en el que exista un acuerdo de incorporación entre CLIENTE y Candidato, independientemente de cuándo la incorporación se produzca.<br>
    b) Si el CLIENTE no efectúa un pago de acuerdo con lo establecido, se considerará un incumplimiento grave de sus obligaciones. Sin mayor requerimiento, el CLIENTE pagará intereses del 0,833% mensual a partir de la fecha en que el pago se adeude.</p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">DEBER DE COLABORACIÓN</h3>
    <p style="font-size:12px">a) El CLIENTE reconoce que es absolutamente necesaria su colaboración para el correcto desarrollo y ejecución de los Servicios, por lo que se obliga a facilitar todos los medios necesarios a su alcance.<br>
    b) EXPANSION no será responsable del incumplimiento o cumplimiento defectuoso de sus obligaciones cuando éstas sean debidas, directa o indirectamente al incumplimiento por el CLIENTE del deber de colaboración.</p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">OBLIGACIONES DEL CONTRATO</h3>
    <p style="font-size:12px">a) Las obligaciones de EXPANSION PEOPLE son: i. Identificar los requerimientos formales de las necesidades de selección; ii. Realizar las gestiones oportunas para presentar el Candidato o Candidatos adecuados al Perfil; iii. En caso de Servicio de Búsqueda y Selección, gestionar y asesorar al CLIENTE en la oferta y hacer un seguimiento de la incorporación del Candidato.<br>
    b) Las obligaciones del CLIENTE son: i. Abonar las tarifas conforme a lo acordado; ii. Facilitar el Perfil del Candidato; iii. Informar tan pronto sucedan cualquiera de las condiciones señaladas en la cláusula CUMPLIMIENTO DEL CONTRATO.</p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">CUMPLIMIENTO DEL CONTRATO</h3>
    <p style="font-size:12px">a) El CLIENTE presenta una oferta laboral al Candidato Seleccionado y el Candidato Seleccionado acepta la oferta del CLIENTE: la aceptación podrá ser expresada en cualquier forma (oral, escrita, etc.) y será independiente de la efectiva incorporación del Candidato como empleado del CLIENTE.<br>
    b) El CLIENTE incorpora a un Candidato, hasta 18 meses después de que EXPANSION haya presentado el candidato al CLIENTE, independientemente del puesto y de las condiciones en las que se incorpora y de la naturaleza de la relación entre el CLIENTE y el Candidato (laboral o mercantil).</p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">GARANTÍA</h3>
    <p style="font-size:12px">a) La Garantía solo aplica para los servicios de Búsqueda y Selección.<br>
    b) El Periodo de Garantía es válido a partir de la fecha de Incorporación del Candidato y tendrá la duración indicada en la Propuesta de Colaboración. En caso de no establecer nada, el periodo será de 3 meses.<br>
    c) En cualquiera de los casos, esta garantía es efectiva una única vez por posición.<br>
    d) La Garantía implica que EXPANSION buscará un nuevo Candidato Seleccionado sin coste para la empresa siempre que se cumplan todas las siguientes condiciones: i. El Candidato Aceptado causa baja voluntaria por razones ajenas a remuneración, contenido del puesto y responsabilidades pactadas previamente; ii. No sean introducidos nuevos requerimientos en el puesto no especificados en el Perfil; iii. Se hayan abonado la totalidad de los Honorarios convenidos en la fecha de vencimiento; iv. El Candidato haya sido evaluado por EXPANSION.<br>
    e) Si el CLIENTE decidiera no ejecutar su derecho de Garantía, no se abonarán ninguna de las facturas.</p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">CONFIDENCIALIDAD</h3>
    <p style="font-size:12px">a) Las Partes están obligadas a mantener total confidencialidad, tanto durante el periodo de vigencia de este contrato, como una vez finalizado, de cuanta información obtengan relacionada directa o indirectamente con los Servicios prestados.<br>
    b) Esta obligación de confidencialidad pesa también sobre los empleados y/o profesionales designados por ambas partes.<br>
    c) Tendrá la consideración de información confidencial cualquiera relativa a asuntos comerciales, documentos legales, tecnología, procesos técnicos, metodologías, datos personales relativos a la plantilla, candidatos y/o clientes, que antes de ser recibidas por la otra parte no estaban en conocimiento o poder de ésta.<br>
    d-f) Las Partes se comprometen recíprocamente a proteger dicha información y a comunicar la obligatoriedad de su cumplimiento a todos los empleados y terceros relacionados.</p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">PROTECCIÓN DE DATOS</h3>
    <p style="font-size:12px">EXPANSION cumplirá con lo dispuesto en el Reglamento General de Protección de Datos (UE) 2016/679 así como en la Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales, y cualquier otra disposición legalmente en vigor. Se informa al Cliente que el tratamiento de sus datos se realizará de acuerdo con lo establecido en la Nota de Privacidad de EXPANSION, disponible en https://EXPANSIONholding.com/declaracion-de-privacidad/</p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">RESPONSABILIDAD</h3>
    <p style="font-size:12px">a) Ninguna de las partes será responsable por cualesquiera daños indirectos (incluidos, entre otros, daños incidentales y consecuenciales, lucro cesante, daños por interrupción de actividades, pérdida de información comercial u otros siniestros) derivados de forma mediata o inmediata del presente Contrato. La indemnización de daños y perjuicios, en caso de falta de cumplimiento de cualesquiera obligaciones asumidas por EXPANSION, queda limitada, por lo que, en ningún caso, excederá del 50% del precio abonado por el CLIENTE para el servicio concreto contratado.<br>
    b) EXPANSION en ningún caso será responsable por cualesquiera daños que se deriven por la selección por parte del CLIENTE de un Candidato no propuesto o no evaluado por EXPANSION.</p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">PROPIEDAD INTELECTUAL Y KNOW HOW</h3>
    <p style="font-size:12px">Los derechos de Propiedad Intelectual sobre las Obras o el Know-How puestos a disposición del CLIENTE corresponderán en exclusiva a EXPANSION. No obstante, EXPANSION cede al CLIENTE de forma no exclusiva los derechos de uso, reproducción y transformación sobre las Obras y el Know-How, exclusivamente con el alcance necesario para el cumplimiento de los fines previstos en el presente contrato.</p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">MISCELÁNEA</h3>
    <p style="font-size:12px">El CLIENTE faculta expresamente a EXPANSION para que éste pueda anunciar públicamente que el primero forma parte de la cartera de clientes de EXPANSION, así como el tipo de servicios que le ha prestado, tanto en comunicaciones en prensa como boletines, reseñas o publicaciones de cualquier tipo o en eventos con fines de publicidad y marketing.</p>
    <h3 style="color:#0A1F5C;font-size:13px;font-weight:700">DOMICILIOS</h3>

    &#8226; Via Augusta 35, piso 6 oficinas 20, 08006, Barcelona, España.<br>

function prop_view(clientId, propIdx) {
  var client = state.clients.find(function(c){return c.id===clientId;});
  if (!client || !client.proposals || !client.proposals[propIdx]) return;
  var p = client.proposals[propIdx];
  var html = p.generatedContent || prop_generateHTML(p, client, p.propTipo || 'completa');

  var modal = document.createElement('div');
  modal.className = 'modal show';
  modal.style.zIndex = '1001';
  modal.innerHTML =
    '<div class="modal-card" style="max-width:860px;max-height:95vh;overflow:hidden;display:flex;flex-direction:column">' +
      '<div class="panel-header" style="flex-shrink:0">' +
        '<h2 class="panel-title">📄 Propuesta — '+p.clientName+'</h2>' +
        '<div style="display:flex;gap:8px">' +
          '<button onclick="prop_printFrame()" style="height:32px;padding:0 12px;background:#0A1F5C;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">&#128424; Imprimir / PDF</button>' +
          '<button id="prop-word-btn" style="height:32px;padding:0 12px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">&#128196; Word</button>' +
          '<button class="icon-button" data-close-modal>&times;</button>' +
        '</div>' +
      '</div>' +
      '<iframe id="prop-preview-frame" style="flex:1;border:none;min-height:600px"></iframe>' +
    '</div>';
  document.body.appendChild(modal);
  var wBtn = document.getElementById('prop-word-btn');
  if (wBtn) wBtn.addEventListener('click', function(){ prop_downloadWord(clientId, propIdx); });

  var frame = document.getElementById('prop-preview-frame');
  frame.contentDocument.open();
  frame.contentDocument.write(html);
  frame.contentDocument.close();

  modal.addEventListener('click', function(e){
    if (e.target.matches('[data-close-modal]') || e.target === modal) modal.remove();
  });
}

function prop_printFrame() {
  var frame = document.getElementById('prop-preview-frame');
  if (frame) frame.contentWindow.print();
}

function prop_uploadSigned(clientId, propIdx) {
  var input = document.getElementById('prop-file-'+clientId+'-'+propIdx);
  if (!input) return;
  input.onchange = function() {
    var file = input.files[0];
    if (!file) return;
    if (file.size > 10000000) { showToast('Archivo muy grande (max 10MB)'); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var client = state.clients.find(function(c){return c.id===clientId;});
      if (!client || !client.proposals || !client.proposals[propIdx]) return;
      client.proposals[propIdx].signedFile = {name: file.name, data: e.target.result, type: file.type};
      client.proposals[propIdx].status = 'firmada';
      saveState();
      openDetail('client', clientId, true);
      showToast('Propuesta firmada adjuntada: '+file.name);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function prop_downloadSigned(clientId, propIdx) {
  var client = state.clients.find(function(c){return c.id===clientId;});
  if (!client || !client.proposals || !client.proposals[propIdx]) return;
  var sf = client.proposals[propIdx].signedFile;
  if (!sf) return;
  var a = document.createElement('a');
  a.href = sf.data;
  a.download = sf.name;
  a.click();
}

function prop_delete(clientId, propIdx) {
  if (!confirm('¿Eliminar esta propuesta?')) return;
  var client = state.clients.find(function(c){return c.id===clientId;});
  if (!client || !client.proposals) return;
  client.proposals.splice(propIdx, 1);
  saveState();
  openDetail('client', clientId, true);
  showToast('Propuesta eliminada');
}


function prop_attachAny(clientId) {
  var input = document.getElementById('prop-attach-any-' + clientId);
  if (!input) return;
  input.onchange = function() {
    var file = input.files[0];
    if (!file) return;
    if (file.size > 15000000) { showToast('Archivo muy grande (max 15MB)'); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var client = state.clients.find(function(c){return c.id===clientId;});
      if (!client) return;
      if (!client.proposals) client.proposals = [];
      var today = new Date().toLocaleDateString('es-ES', {day:'2-digit',month:'long',year:'numeric'});
      client.proposals.push({
        id: uid(),
        date: today,
        status: 'adjuntada',
        clientName: client.name,
        consultorName: state.currentUser || 'Santi',
        feeLines: [],
        paymentTerms: {},
        signedFile: {name: file.name, data: e.target.result, type: file.type},
        generatedContent: null
      });
      saveState();
      openDetail('client', clientId, true);
      showToast('Propuesta adjuntada: ' + file.name);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}


function prop_downloadWord(clientId, propIdx) {
  var client = state.clients.find(function(c){return c.id===clientId;});
  if (!client || !client.proposals || !client.proposals[propIdx]) return;
  var p = client.proposals[propIdx];
  var html = p.generatedContent || prop_generateHTML(p, client, p.propTipo || 'completa');
  // Wrap in Word-compatible HTML
  var wordHtml = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">' +
    '<head><meta charset="utf-8"><title>Propuesta '+p.clientName+'</title>' +
    '<!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml><![endif]-->' +
    '<style>body{font-family:Arial,sans-serif;font-size:12pt;margin:2cm}h2{color:#0A1F5C}table{border-collapse:collapse;width:100%}td,th{border:1px solid #CBD5E1;padding:6px 10px}</style>' +
    '</head><body>' + html.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/class="no-print"[^>]*>[\s\S]*?<\/div>/g,'') + '</body></html>';
  var blob = new Blob([wordHtml], {type: 'application/msword'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'Propuesta_' + p.clientName.replace(/[^a-zA-Z0-9]/g,'_') + '.doc';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Descargando Word...');
}

function prop_setRenewal(clientId, propIdx, dateVal) {
  var client = state.clients.find(function(c){return c.id===clientId;});
  if (!client || !client.proposals || !client.proposals[propIdx]) return;
  client.proposals[propIdx].renewalDate = dateVal;
  saveState();
  if (dateVal) {
    var delay = new Date(dateVal).getTime() - Date.now();
    var p = client.proposals[propIdx];
    if (delay > 0 && delay < 400*24*3600*1000) {
      setTimeout(function(){
        showNotification("Renovacion propuesta: " + p.clientName, "La propuesta firmada se vence. Revisar condiciones.");
      }, delay);
    }
    showToast("Aviso programado: " + new Date(dateVal).toLocaleDateString("es-ES"));
  }
  openDetail('client', clientId, true);
}

function renderFichaje() {
  eyebrow.textContent = "Equipo";
  title.textContent = "Fichaje";
  quickAdd.style.display = "none";

  var isAdmin = currentUser && currentUser.role === 'admin';
  var myUid = currentUser ? currentUser.uid : '';
  var fichajeUser = window._fichajeUser || 'propio'; // 'propio' o uid de otro usuario
  // Por ahora fichaje solo muestra los propios (guardados en user_data)
  // Admins ven el resumen del equipo desde Métricas

  const today = new Date().toISOString().split("T")[0];

  if (!state.fichajes) state.fichajes = [];

  const openEntry = state.fichajes.find(f => f.date === today && f.entrada && !f.salida);

  function fmtTime(iso) {
    if (!iso) return "—";
    return new Date(iso).toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });
  }

  function calcHours(entries) {
    return entries.reduce((sum, e) => {
      if (e.entrada && e.salida) {
        return sum + (new Date(e.salida) - new Date(e.entrada)) / 3600000;
      }
      return sum;
    }, 0);
  }

  function fmtHours(h) {
    const hrs = Math.floor(h);
    const mins = Math.round((h - hrs) * 60);
    return hrs + "h " + mins + "m";
  }

  const last7 = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split("T")[0];
    const entries = state.fichajes.filter(f => f.date === ds);
    last7.push({
      date: ds,
      entries,
      total: calcHours(entries),
      label: i === 0 ? "Hoy" : i === 1 ? "Ayer" : d.toLocaleDateString("es-ES", { weekday: "short", day: "numeric", month: "short" })
    });
  }

  const todayEntries = state.fichajes.filter(f => f.date === today);
  const todayTotal = calcHours(todayEntries);
  const weekTotal = last7.reduce((s, d) => s + d.total, 0);

  const rows = last7.filter(d => d.entries.length > 0).map(d =>
    d.entries.map((e, ei) =>
      "<tr>" +
      "<td style='font-weight:700;color:#1E293B'>" + (ei === 0 ? d.label : "") + "</td>" +
      "<td style='color:#166534;font-weight:600'>" + fmtTime(e.entrada) + "</td>" +
      "<td style='color:" + (e.salida ? "#991B1B" : "#F59E0B") + ";font-weight:600'>" + fmtTime(e.salida) + "</td>" +
      "<td style='font-weight:700'>" + (e.entrada && e.salida ? fmtHours((new Date(e.salida) - new Date(e.entrada)) / 3600000) : e.entrada ? "<span style='color:#F59E0B'>En curso</span>" : "—") + "</td>" +
      "<td style='color:#64748B;font-size:12px'>" + (e.notas || "—") + "</td>" +
      "<td><button class='ghost-button' style='height:28px;font-size:11px;padding:0 8px;color:#EF4444;border-color:#FECACA' onclick='deleteFichaje(\"" + e.id + "\")'>🗑️</button></td>" +
      "</tr>"
    ).join("")
  ).join("");

  app.innerHTML =
    "<div class='grid two' style='margin-bottom:18px'>" +
      "<article class='panel' style='border-top:4px solid #0A1F5C'>" +
        "<div class='panel-body' style='display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:100px'>" +
          "<div>" +
            "<div class='eyebrow' style='margin-bottom:6px'>Estado actual</div>" +
            "<div style='font-size:20px;font-weight:800;color:" + (openEntry ? "#166534" : "#64748B") + ";display:flex;align-items:center;gap:9px'>" +
              "<span style='width:11px;height:11px;border-radius:50%;background:" + (openEntry ? "#22C55E" : "#CBD5E1") + ";display:inline-block'></span>" +
              (openEntry ? "En oficina" : "Fuera de oficina") +
            "</div>" +
            (openEntry ? "<div style='font-size:12px;color:#64748B;margin-top:4px'>Entrada: " + fmtTime(openEntry.entrada) + "</div>" : "") +
          "</div>" +
          "<div>" +
            (openEntry
              ? "<button class='primary-button' style='background:#DC2626;border-color:#DC2626;font-size:14px;padding:0 22px;height:46px' onclick='fichajeAction(\"salida\")'>🚪 Fichar Salida</button>"
              : "<button class='primary-button' style='font-size:14px;padding:0 22px;height:46px' onclick='fichajeAction(\"entrada\")'>✅ Fichar Entrada</button>") +
          "</div>" +
        "</div>" +
      "</article>" +
      "<article class='panel' style='border-top:4px solid #2563EB'>" +
        "<div class='panel-body'>" +
          "<div style='display:grid;grid-template-columns:1fr 1fr;gap:14px'>" +
            "<div><div class='eyebrow' style='margin-bottom:5px'>Hoy</div><div style='font-size:26px;font-weight:800;color:#0A1F5C;letter-spacing:-.02em'>" + fmtHours(todayTotal) + "</div></div>" +
            "<div><div class='eyebrow' style='margin-bottom:5px'>Esta semana</div><div style='font-size:26px;font-weight:800;color:#0A1F5C;letter-spacing:-.02em'>" + fmtHours(weekTotal) + "</div></div>" +
          "</div>" +
        "</div>" +
      "</article>" +
    "</div>" +
    "<div class='panel' style='margin-bottom:18px'>" +
      "<div class='panel-header'>" +
        "<span class='panel-title'>Historial últimos 7 días</span>" +
        "<button class='ghost-button' style='height:32px;font-size:12px;padding:0 12px' onclick='fichajeManual()'>+ Manual</button>" +
      "</div>" +
      "<div class='table-wrap' style='border:none;border-radius:0;box-shadow:none'>" +
        "<table><thead><tr><th>Día</th><th>Entrada</th><th>Salida</th><th>Total</th><th>Notas</th><th></th></tr></thead>" +
        "<tbody>" + (rows || "<tr><td colspan='6' style='text-align:center;color:#94A3B8;padding:24px'>Sin registros esta semana</td></tr>") + "</tbody>" +
        "</table>" +
      "</div>" +
    "</div>" +
    "<div id='fm-form' style='display:none' class='panel'>" +
      "<div class='panel-header'><span class='panel-title'>Entrada manual</span></div>" +
      "<div class='panel-body'>" +
        "<div class='form-grid'>" +
          "<div class='field'><label>Fecha</label><input type='date' id='fm-date' value='" + today + "'/></div>" +
          "<div class='field'><label>Entrada</label><input type='time' id='fm-entrada'/></div>" +
          "<div class='field'><label>Salida</label><input type='time' id='fm-salida'/></div>" +
          "<div class='field'><label>Notas</label><input type='text' id='fm-notas' placeholder='Trabajo desde casa...'/></div>" +
        "</div>" +
        "<div style='display:flex;gap:8px;margin-top:14px'>" +
          "<button class='primary-button' onclick='saveFichajeManual()'>💾 Guardar</button>" +
          "<button class='ghost-button' onclick='document.getElementById(\"fm-form\").style.display=\"none\"'>Cancelar</button>" +
        "</div>" +
      "</div>" +
    "</div>";
}

function fichajeAction(type) {
  if (!state.fichajes) state.fichajes = [];
  const today = new Date().toISOString().split("T")[0];
  const now = new Date().toISOString();
  if (type === "entrada") {
    state.fichajes.push({ id: Date.now().toString(), date: today, entrada: now, salida: null, notas: "" });
    showToast("✅ Entrada registrada");
  } else {
    const open = state.fichajes.find(f => f.date === today && f.entrada && !f.salida);
    if (open) { open.salida = now; showToast("👋 Salida registrada"); }
  }
  saveState();
  renderFichaje();
}

function fichajeManual() {
  const f = document.getElementById("fm-form");
  if (f) f.style.display = f.style.display === "none" ? "block" : "none";
}

function saveFichajeManual() {
  if (!state.fichajes) state.fichajes = [];
  const date = document.getElementById("fm-date").value;
  const ei = document.getElementById("fm-entrada").value;
  const si = document.getElementById("fm-salida").value;
  const notas = document.getElementById("fm-notas").value;
  if (!date || !ei) { showToast("⚠️ Fecha y entrada obligatorios"); return; }
  state.fichajes.push({
    id: Date.now().toString(), date,
    entrada: new Date(date + "T" + ei).toISOString(),
    salida: si ? new Date(date + "T" + si).toISOString() : null,
    notas
  });
  saveState();
  showToast("💾 Guardado");
  renderFichaje();
}

function deleteFichaje(id) {
  if (!confirm("¿Eliminar este registro?")) return;
  state.fichajes = (state.fichajes || []).filter(f => f.id !== id);
  saveState();
  renderFichaje();
}

// ============================================================
// MÉTRICAS DE PROCESO
// ============================================================
function renderMetricas() {
  eyebrow.textContent = "Metricas";
  title.textContent = "Metricas de proceso";
  quickAdd.style.display = "none";

  var now = new Date();
  var weekAgo = new Date(now - 7*24*3600*1000);
  var monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  var jobs = state.jobs || [];
  var cands = state.candidates || [];
  var placements = state.placements || [];
  var tasks = state.tasks || [];

  var openJobs = jobs.filter(function(j){return (j.jobStatus||j.status||"")!=="Cancelado" && (j.jobStatus||j.status||"")!=="Facturado";}).length;
  var totalJobs = jobs.length;

  // Pipeline counts from all jobs
  var allPipeline = [];
  jobs.forEach(function(j){ (j.pipeline||[]).forEach(function(p){ allPipeline.push({stage:p.stage, label:p.label, jobId:j.id}); }); });

  var entrevistas = allPipeline.filter(function(p){return p.stage==="Entrevista"||p.stage==="Entrevista C/C";}).length;
  var ofertas = allPipeline.filter(function(p){return p.stage==="Oferta";}).length;
  var placements_month = placements.filter(function(p){
    var MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    return p.month === MONTHS[now.getMonth()];
  }).length;
  var placements_week = placements.filter(function(p){
    return p.date && new Date(p.date) >= weekAgo;
  }).length;
  var revenue_month = placements.filter(function(p){
    var MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    return p.month === MONTHS[now.getMonth()];
  }).reduce(function(s,p){return s+(parseFloat(p.amount)||0);},0);
  var cands_total = cands.length;
  var cands_active = allPipeline.length;
  var forecast_month = (state.forecast||[]).filter(function(f){
    var MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    return f.month === MONTHS[now.getMonth()];
  }).reduce(function(s,f){return s+(parseFloat(f.amount)||0);},0);

  var METRICS = [
    {label:"Jobs abiertos", value:openJobs, sub:"de "+totalJobs+" totales", color:"#2563EB"},
    {label:"En pipeline", value:cands_active, sub:"candidatos activos", color:"#7C3AED"},
    {label:"Entrevistas activas", value:entrevistas, sub:"en proceso", color:"#0891B2"},
    {label:"Ofertas activas", value:ofertas, sub:"pendientes", color:"#D97706"},
    {label:"Placements este mes", value:placements_month, sub:money(revenue_month), color:"#059669"},
    {label:"Placements esta semana", value:placements_week, sub:"ultimos 7 dias", color:"#16A34A"},
    {label:"Forecast mes", value:money(forecast_month), sub:"previsto facturar", color:"#2563EB", isMoney:true},
    {label:"Candidatos totales", value:cands_total, sub:"en la app", color:"#64748B"},
  ];

  var cards = METRICS.map(function(m){
    return "<div class='panel' style='border-top:4px solid "+m.color+"'><div class='panel-body'>" +
      "<div style='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#94A3B8;margin-bottom:6px'>"+m.label+"</div>" +
      "<div style='font-size:28px;font-weight:800;color:#0A1F5C;letter-spacing:-.02em'>"+(m.isMoney?m.value:m.value)+"</div>" +
      "<div style='font-size:12px;color:#64748B;margin-top:3px'>"+m.sub+"</div>" +
    "</div></div>";
  }).join("");

  // Jobs by status breakdown
  var statusBreakdown = ["En proceso","Abierto","Standby","Cancelado","Facturado"].map(function(s){
    var cnt = jobs.filter(function(j){return (j.jobStatus||j.status||"")=== s;}).length;
    var color = s==="Abierto"||s==="En proceso"?"#22C55E":s==="Standby"?"#94A3B8":s==="Cancelado"?"#EF4444":"#2563EB";
    return cnt ? "<div style='display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F1F5F9'>" +
      "<div style='display:flex;align-items:center;gap:8px'><span style='width:8px;height:8px;border-radius:50%;background:"+color+";display:inline-block'></span>" +
      "<span style='font-size:13px;font-weight:600'>"+s+"</span></div>" +
      "<span style='font-size:14px;font-weight:800;color:"+color+"'>"+cnt+"</span></div>" : "";
  }).join("");

  app.innerHTML =
    "<div style='display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px'>" + cards + "</div>" +
    "<div class='grid two'>" +
      "<div class='panel'><div class='panel-header'><span class='panel-title'>Jobs por estado</span></div>" +
        "<div class='panel-body'>"+statusBreakdown+"</div></div>" +
      "<div class='panel'><div class='panel-header'><span class='panel-title'>Pipeline por etapa</span></div>" +
        "<div class='panel-body'>" +
        ["Busqueda","Contactado","Entrevista","Entrevista C/C","Oferta"].map(function(stage){
          var cnt = allPipeline.filter(function(p){return p.stage===stage;}).length;
          var pct = cands_active > 0 ? Math.round(cnt/cands_active*100) : 0;
          return "<div style='margin-bottom:10px'>" +
            "<div style='display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:3px'><span>"+stage+"</span><span>"+cnt+"</span></div>" +
            "<div style='height:6px;background:#F1F5F9;border-radius:3px'><div style='height:100%;width:"+pct+"%;background:#2563EB;border-radius:3px'></div></div>" +
          "</div>";
        }).join("") +
        "</div></div>" +
    "</div>";
}
