<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expansion People Hub</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
  --navy: #0A1F5C;
  --navy2: #0d2470;
  --blue: #2563EB;
  --blue2: #3B82F6;
  --sky: #EFF6FF;
  --sky2: #DBEAFE;
  --line: #E2E8F0;
  --line2: #CBD5E1;
  --muted: #64748B;
  --soft: #F8FAFC;
  --bg: #F1F5F9;
  --ink: #0F172A;
  --green: #DCFCE7;
  --green2: #166534;
  --red: #FEE2E2;
  --red2: #991B1B;
  --orange: #F59E0B;
  --yellow: #FEF9C3;
  --purple: #F3E8FF;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(10,31,92,0.08), 0 2px 6px rgba(10,31,92,0.04);
  --shadow-lg: 0 10px 40px rgba(10,31,92,0.12);
  --r: 10px;
  --r-lg: 14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Plus Jakarta Sans', 'Segoe UI', ui-sans-serif, system-ui, sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

button, input, select, textarea { font: inherit; }
button { cursor: pointer; }
a { color: var(--blue); text-decoration: none; }

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  inset: 0 auto 0 0;
  width: 240px;
  display: flex;
  flex-direction: column;
  background: #fff;
  border-right: 1px solid var(--line);
  box-shadow: 2px 0 16px rgba(10,31,92,0.04);
  z-index: 5;
}

.brand {
  height: 72px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}

.brand img {
  max-width: 110px;
  max-height: 42px;
  object-fit: contain;
}

.nav {
  flex: 1;
  padding: 12px 10px;
  overflow-y: auto;
}

.nav::-webkit-scrollbar { width: 3px; }
.nav::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

.nav-group { margin-bottom: 4px; }

.nav-label {
  padding: 10px 10px 4px;
  color: #94A3B8;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .07em;
  text-transform: uppercase;
}

.nav button {
  width: 100%;
  min-height: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  color: #64748B;
  background: transparent;
  border: 0;
  border-radius: var(--r);
  text-align: left;
  font-size: 13.5px;
  font-weight: 500;
  transition: all .15s;
  margin-bottom: 1px;
}

.nav button:hover { background: var(--sky); color: var(--navy); }

.nav button.active {
  color: var(--navy);
  background: var(--sky);
  font-weight: 700;
}

.nav .icon {
  width: 26px;
  min-width: 26px;
  height: 26px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.profile {
  margin: auto 12px 12px;
  padding: 12px 14px;
  display: flex;
  gap: 10px;
  align-items: center;
  background: var(--soft);
  border: 1px solid var(--line);
  border-radius: var(--r);
  flex-shrink: 0;
}

.avatar {
  width: 36px;
  height: 36px;
  display: grid;
  place-items: center;
  color: #fff;
  background: var(--navy);
  border-radius: 50%;
  font-weight: 800;
  font-size: 13px;
  flex-shrink: 0;
}

.profile strong { display: block; font-size: 13px; font-weight: 700; }
.profile span { display: block; color: var(--muted); font-size: 11px; margin-top: 1px; }

/* ── SHELL + TOPBAR ── */
.shell {
  margin-left: 240px;
  min-height: 100vh;
}

.topbar {
  position: sticky;
  top: 0;
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 0 28px;
  background: rgba(255,255,255,.95);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(10px);
  z-index: 3;
  box-shadow: var(--shadow);
}

.eyebrow {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2px;
}

h1 {
  font-size: 20px;
  font-weight: 700;
  color: #1E293B;
  letter-spacing: -.02em;
}

.topbar-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

/* ── BUTTONS ── */
.primary-button, .ghost-button, .icon-button {
  height: 38px;
  border-radius: 8px;
  border: 1.5px solid transparent;
  font-weight: 700;
  font-size: 13px;
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.primary-button {
  padding: 0 16px;
  color: #fff;
  background: var(--navy);
  border-color: var(--navy);
}
.primary-button:hover { background: var(--navy2); border-color: var(--navy2); box-shadow: 0 4px 12px rgba(10,31,92,0.25); }

.ghost-button {
  padding: 0 14px;
  color: var(--navy);
  background: #fff;
  border-color: var(--line2);
}
.ghost-button:hover { background: var(--soft); border-color: var(--blue); }

.icon-button {
  width: 38px;
  justify-content: center;
  color: var(--navy);
  background: #fff;
  border-color: var(--line2);
  font-size: 16px;
}
.icon-button:hover { background: var(--sky); border-color: var(--blue); }

/* ── CONTENT ── */
.content { padding: 28px 28px 54px; }

/* ── GRID + PANEL ── */
.grid { display: grid; gap: 16px; }
.grid.two { grid-template-columns: repeat(2, minmax(0,1fr)); }
.grid.three { grid-template-columns: repeat(3, minmax(0,1fr)); }

.panel {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
}

.panel-header {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
}

.panel-title {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: #64748B;
}

.panel-body { padding: 16px 18px 18px; }

.metric { min-height: 120px; }
.metric strong { display: block; color: var(--navy); font-size: 32px; font-weight: 800; line-height: 1.1; letter-spacing: -.03em; }
.metric span { color: var(--muted); font-size: 13px; margin-top: 4px; display: block; }

.progress { height: 8px; margin-top: 12px; overflow: hidden; background: #E8EDF5; border-radius: 999px; }
.progress div { height: 100%; background: linear-gradient(90deg, var(--navy), var(--blue)); border-radius: inherit; }

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.directory-toolbar {
  display: grid;
  grid-template-columns: minmax(240px,1fr) auto auto auto;
  gap: 10px;
  align-items: center;
  margin-bottom: 16px;
}

.compact-select {
  width: 190px;
  height: 38px;
  padding: 0 10px;
  border: 1.5px solid var(--line2);
  border-radius: 8px;
  background: #fff;
  color: var(--navy);
  font-weight: 700;
}

.search-wrap { position: relative; }
.search-wrap span {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--blue);
  font-size: 17px;
  pointer-events: none;
}

.directory-search {
  width: 100%;
  height: 38px;
  padding: 0 12px 0 40px;
  border: 1.5px solid var(--line2);
  border-radius: 8px;
  background: #fff;
  transition: border-color .15s;
}
.directory-search:focus { outline: none; border-color: var(--blue); }

.segmented { display: flex; flex-wrap: wrap; gap: 6px; }
.segmented button {
  height: 34px;
  padding: 0 14px;
  color: #64748B;
  background: #fff;
  border: 1.5px solid var(--line2);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  transition: all .15s;
}
.segmented button.active {
  color: #fff;
  background: var(--blue);
  border-color: var(--blue);
  box-shadow: 0 4px 12px rgba(37,99,235,.22);
}

.directory-add {
  height: 38px;
  padding: 0 18px;
  background: var(--navy);
  border-color: var(--navy);
  color: #fff;
  border-radius: 8px;
  font-weight: 700;
  font-size: 13px;
}
.directory-add:hover { background: var(--navy2); }

/* ── DIRECTORY CARDS ── */
.directory-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(240px,1fr));
  gap: 12px;
}

.directory-card {
  position: relative;
  padding: 18px 18px 14px 22px;
  overflow: hidden;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
  transition: all .18s;
  cursor: pointer;
}
.directory-card:hover {
  border-color: var(--blue2);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.card-accent {
  position: absolute;
  inset: 0 auto 0 0;
  width: 5px;
  background: var(--blue);
  border-radius: var(--r-lg) 0 0 var(--r-lg);
}

.directory-card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.directory-card h2 { font-size: 15px; font-weight: 700; color: #1E293B; line-height: 1.2; }

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  height: 22px;
  padding: 0 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  white-space: nowrap;
  background: #F1F5F9;
  color: #64748B;
}
.status-badge::before { content: "●"; font-size: 8px; }
.status-badge.green { background: var(--green); color: var(--green2); }
.status-badge.yellow { background: var(--yellow); color: #854D0E; }
.status-badge.yellow::before { content: "●"; }
.status-badge.red { background: var(--red); color: var(--red2); }
.status-badge.red::before { content: "●"; }

.directory-card dl { display: grid; gap: 6px; margin: 0; }
.directory-card dl div { display: grid; grid-template-columns: 88px 1fr; gap: 8px; }
.directory-card dt { color: #94A3B8; font-size: 12px; }
.directory-card dd { margin: 0; color: #475569; font-size: 12px; font-weight: 600; text-align: right; overflow-wrap: anywhere; }

.directory-card p { margin: 12px 0 10px; color: #64748B; font-size: 12px; line-height: 1.4; min-height: 32px; }

.directory-actions {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  opacity: 0;
  transition: opacity .15s;
}
.directory-card:hover .directory-actions,
.directory-card:focus-within .directory-actions { opacity: 1; }

.job-panel, .directory-card, .linked-card { cursor: pointer; }

/* ── DETAIL VIEW ── */
.back-button { margin-bottom: 14px; }

.detail-hero {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  padding: 22px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-left: 5px solid var(--blue);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-md);
}

.detail-hero h2 { margin: 10px 0 7px; color: #1E293B; font-size: 26px; font-weight: 800; letter-spacing: -.02em; }
.detail-hero p { max-width: 720px; color: #64748B; line-height: 1.5; font-size: 13px; }

.detail-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }

.detail-grid {
  display: grid;
  grid-template-columns: minmax(260px,.85fr) minmax(340px,1.15fr);
  gap: 16px;
  margin-top: 16px;
}

.detail-list { display: grid; gap: 10px; }
.detail-list div { display: grid; grid-template-columns: 120px 1fr; gap: 12px; align-items: start; }
.detail-list span { color: #94A3B8; font-size: 12px; }
.detail-list strong { color: #1E293B; font-size: 13px; overflow-wrap: anywhere; }

.linked-grid { display: grid; gap: 8px; }

.linked-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px;
  background: #F8FAFC;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  transition: all .15s;
}
.linked-card strong { display: block; font-size: 13px; font-weight: 700; color: #1E293B; }
.linked-card span { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; }
.linked-card:hover, .candidate-mini:hover { border-color: var(--blue2); background: var(--sky); }

.text-link {
  padding: 0;
  color: var(--blue);
  background: transparent;
  border: 0;
  font-weight: 700;
  font-size: 13px;
  text-decoration: underline;
}

/* ── ROUTINE BOARD ── */
.routine-board {
  display: grid;
  grid-template-columns: 76px repeat(5, minmax(160px,1fr));
  overflow-x: auto;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
}

.routine-corner, .routine-day, .routine-hour, .routine-cell {
  border-right: 1px solid #E7EEF6;
  border-bottom: 1px solid #E7EEF6;
}

.routine-corner, .routine-day {
  position: sticky;
  top: 0;
  z-index: 1;
  padding: 12px;
  color: var(--navy);
  background: #F8FAFD;
  font-weight: 800;
  font-size: 13px;
}

.routine-hour {
  min-height: 68px;
  padding: 10px 12px;
  color: #7A8799;
  background: #FBFDFF;
  font-size: 12px;
  font-weight: 700;
}

.routine-cell { min-height: 68px; padding: 7px; }

.routine-block {
  width: 100%;
  display: grid;
  gap: 3px;
  padding: 8px;
  color: #18325B;
  background: var(--sky);
  border: 1px solid #CFE0F4;
  border-radius: 7px;
  text-align: left;
  font-size: 12px;
}
.routine-block strong { display: block; font-weight: 700; }
.routine-block span { display: block; color: #536174; font-size: 11px; }

/* ── SEARCH + TABLE ── */
.search {
  width: min(420px,100%);
  height: 38px;
  padding: 0 12px;
  border: 1.5px solid var(--line2);
  border-radius: 8px;
  background: #fff;
  transition: border-color .15s;
}
.search:focus { outline: none; border-color: var(--blue); }

.table-wrap {
  overflow-x: auto;
  border: 1.5px solid var(--line);
  border-radius: var(--r-lg);
  background: #fff;
  box-shadow: var(--shadow);
}

table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 14px; border-bottom: 1px solid #EDF1F7; text-align: left; vertical-align: top; }
th { color: #64748B; background: #F8FAFC; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }
tr:last-child td { border-bottom: 0; }
tr:hover td { background: #FAFBFC; }

.pill {
  display: inline-flex;
  align-items: center;
  height: 22px;
  padding: 0 8px;
  color: var(--navy);
  background: var(--sky);
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  white-space: nowrap;
}
.pill.green { color: var(--green2); background: var(--green); }
.pill.red { color: var(--red2); background: var(--red); }

.row-actions { display: flex; gap: 6px; }

/* ── FORM ── */
.form-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }

.field { display: grid; gap: 5px; }
.field.full { grid-column: 1/-1; }
.field label { color: #64748B; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }

.field input, .field select, .field textarea {
  width: 100%;
  min-height: 38px;
  padding: 8px 10px;
  border: 1.5px solid var(--line2);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--blue); }
.field textarea { min-height: 80px; resize: vertical; line-height: 1.5; }

/* ── MODAL ── */
.modal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(10,20,40,.38);
  backdrop-filter: blur(4px);
  z-index: 20;
}
.modal.show { display: flex; }

.modal-card {
  width: min(720px,100%);
  max-height: 90vh;
  overflow: auto;
  background: #fff;
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lg);
  animation: modal-in .18s ease;
}
@keyframes modal-in {
  from { opacity:0; transform:scale(.97) translateY(8px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 18px;
  border-top: 1px solid var(--line);
}

/* ── KANBAN ── */
.kanban {
  display: grid;
  grid-template-columns: repeat(4,minmax(210px,1fr));
  gap: 12px;
  overflow-x: auto;
}

.lane {
  min-height: 240px;
  padding: 12px;
  background: #F8FAFD;
  border: 1.5px solid var(--line);
  border-radius: var(--r-lg);
}
.lane h3 { margin-bottom: 10px; color: #64748B; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }

.lane-add {
  width: 100%;
  height: 32px;
  margin-bottom: 9px;
  color: var(--navy);
  background: #fff;
  border: 1.5px dashed var(--blue2);
  border-radius: 7px;
  font-size: 12px;
  font-weight: 700;
  transition: all .15s;
}
.lane-add:hover { background: var(--sky); border-color: var(--blue); }

.card {
  padding: 10px 12px;
  margin-bottom: 8px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  transition: all .15s;
}
.card:hover { border-color: var(--blue2); box-shadow: var(--shadow-md); }
.card strong { display: block; color: #1E293B; font-size: 13px; font-weight: 700; }
.card small { color: var(--muted); font-size: 12px; }

/* ── TASKS ── */
.task {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px;
  align-items: start;
  padding: 12px 0;
  border-bottom: 1px solid #F1F5F9;
}
.task:last-child { border-bottom: 0; }
.task.done strong { color: #94A3B8; text-decoration: line-through; }

/* ── CALENDAR ── */
.calendar {
  display: grid;
  grid-template-columns: repeat(5,minmax(140px,1fr));
  gap: 10px;
}

.day {
  min-height: 180px;
  padding: 12px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: var(--r-lg);
  transition: all .15s;
}
.day.drop-target { background: var(--sky); border-color: var(--blue); }
.day h3 { margin-bottom: 9px; font-size: 13px; font-weight: 700; color: var(--navy); }

.event {
  padding: 8px;
  margin-bottom: 6px;
  background: var(--sky);
  border: 1px solid #D5E4F7;
  border-radius: 7px;
  font-size: 12px;
  cursor: grab;
  transition: all .15s;
}
.event:hover { background: var(--sky2); border-color: var(--blue2); }
.event.dragging { opacity: .5; cursor: grabbing; }

/* ── REPORT BOX ── */
.report-box {
  min-height: 200px;
  padding: 14px;
  white-space: pre-wrap;
  background: #F8FAFC;
  border: 1.5px solid var(--line);
  border-radius: var(--r-lg);
  font-size: 13px;
  line-height: 1.6;
  color: #334155;
}

/* ── POMODORO ── */
.pomodoro { display: grid; place-items: center; min-height: 300px; text-align: center; }

.pomodoro-layout {
  display: grid;
  grid-template-columns: minmax(340px,1fr) 260px;
  gap: 16px;
}

.focus-options { display: grid; gap: 9px; align-content: start; }

.focus-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 0 0 3px;
}
.focus-header strong { color: #64748B; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }

.focus-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: var(--r);
  color: #26344C;
  text-align: left;
  transition: all .15s;
  min-height: 70px;
}
.focus-card.active { border-color: var(--blue); box-shadow: inset 4px 0 0 var(--blue); }
.focus-card > button { flex: 1; min-height: 46px; padding: 3px 7px; color: inherit; background: transparent; border: 0; text-align: left; }
.focus-card > div { display: flex; gap: 5px; }
.focus-card strong { display: block; font-size: 13px; font-weight: 700; }
.focus-card span { display: block; color: var(--muted); font-size: 12px; }

/* ── REPORTS ── */
.reports-layout { display: grid; grid-template-columns: 300px minmax(0,1fr); gap: 16px; }
.reports-sidebar { display: grid; align-content: start; gap: 10px; }

.report-project {
  display: grid;
  gap: 7px;
  padding: 13px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-left: 4px solid var(--blue);
  border-radius: var(--r);
  cursor: pointer;
  transition: all .15s;
}
.report-project:hover { border-color: var(--blue2); box-shadow: var(--shadow-md); }
.report-project span { color: var(--muted); font-size: 12px; }

/* ── COMMERCIAL BOARD ── */
.commercial-board {
  display: grid;
  grid-template-columns: repeat(4,minmax(220px,1fr));
  gap: 12px;
  overflow-x: auto;
}

.commercial-lane {
  min-height: 500px;
  padding: 12px;
  background: #F8FAFD;
  border: 1.5px solid var(--line);
  border-radius: var(--r-lg);
}
.commercial-lane h2 { margin-bottom: 11px; color: var(--navy); font-size: 14px; font-weight: 700; }

.commercial-card {
  display: grid;
  gap: 7px;
  margin-bottom: 9px;
  padding: 13px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: var(--r);
  cursor: pointer;
  transition: all .15s;
  box-shadow: var(--shadow);
}
.commercial-card:hover { border-color: var(--blue2); box-shadow: var(--shadow-md); }
.commercial-card span { color: var(--blue); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; }
.commercial-card p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.4; }
.commercial-card small { color: #526174; font-weight: 700; font-size: 12px; }

/* ── BILLING / PLACEMENTS ── */
.quarter-grid, .month-grid {
  display: grid;
  grid-template-columns: repeat(4,minmax(200px,1fr));
  gap: 12px;
  margin-top: 14px;
}
.month-grid { grid-template-columns: repeat(3,minmax(200px,1fr)); }

.quarter-card, .month-card {
  min-height: 130px;
  display: grid;
  align-content: center;
  gap: 7px;
  padding: 20px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-left: 5px solid var(--blue);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
  text-align: left;
  transition: all .18s;
  cursor: pointer;
}
.quarter-card:hover, .month-card:hover { border-color: var(--blue2); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.quarter-card span, .month-card span { color: var(--navy); font-size: 16px; font-weight: 800; }
.quarter-card strong, .month-card strong { font-size: 24px; font-weight: 800; color: #1E293B; letter-spacing: -.03em; }
.quarter-card small, .month-card small { color: var(--muted); font-size: 12px; }

.billing-dashboard {
  display: grid;
  grid-template-columns: minmax(200px,.8fr) repeat(3,minmax(200px,1fr)) minmax(170px,.8fr);
  gap: 12px;
  margin-bottom: 16px;
}

.billing-total, .billing-chart, .billing-insights {
  padding: 14px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
}

.billing-total {
  display: grid;
  align-content: center;
  gap: 7px;
  border-left: 5px solid var(--blue);
}
.billing-total span, .billing-insights span { color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }
.billing-total strong { color: var(--navy); font-size: 26px; font-weight: 800; letter-spacing: -.03em; }
.billing-total small { color: var(--muted); font-size: 12px; }

.billing-chart h2 { margin-bottom: 11px; color: #64748B; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; }

.mini-bar { display: grid; gap: 4px; margin-bottom: 9px; }
.mini-bar div, .billing-insights div { display: flex; justify-content: space-between; gap: 9px; }
.mini-bar span { color: #536174; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mini-bar strong { color: #1E293B; font-size: 12px; font-weight: 700; white-space: nowrap; }
.mini-bar i { height: 7px; overflow: hidden; background: #E8EEF6; border-radius: 999px; margin-top: 2px; }
.mini-bar b { display: block; height: 100%; background: var(--blue); border-radius: inherit; }

.billing-insights { display: grid; align-content: center; gap: 14px; }
.billing-insights div { display: grid; gap: 3px; }
.billing-insights strong { color: #1E293B; font-size: 15px; font-weight: 700; }

/* ── TIMER ── */
.timer {
  color: var(--navy);
  font-size: clamp(54px,9vw,108px);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -.04em;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  right: 20px;
  bottom: 20px;
  transform: translateY(18px);
  opacity: 0;
  padding: 11px 16px;
  color: #fff;
  background: #1E293B;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: var(--shadow-md);
  transition: .2s ease;
  z-index: 40;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── RESPONSIVE ── */
@media (max-width: 980px) {
  .sidebar { position: sticky; top: 0; width: 100%; min-height: auto; }
  .brand { height: 68px; }
  .profile { display: none; }
  .nav { display: flex; gap: 6px; padding: 8px 10px; overflow-x: auto; }
  .nav-group { display: contents; }
  .nav-label { display: none; }
  .nav button { min-width: max-content; font-size: 13px; }
  .shell { margin-left: 0; }
  .topbar { position: static; align-items: flex-start; flex-direction: column; padding: 16px; min-height: auto; }
  .content { padding: 16px; }
  .grid.two, .grid.three, .form-grid, .calendar, .directory-toolbar,
  .directory-grid, .detail-grid, .pomodoro-layout, .reports-layout,
  .commercial-board, .quarter-grid, .month-grid, .billing-dashboard { grid-template-columns: 1fr; }
  .detail-hero { flex-direction: column; }
  .search-wrap { max-width: none; }
  .directory-actions { opacity: 1; }
}
</style>

function initFirebase() {
  return new Promise(function(resolve, reject) {
    // Load Firebase SDK dynamically
    var scripts = [
      "https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js",
      "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js",
      "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"
    ];
    var loaded = 0;
    scripts.forEach(function(src) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = function() {
        loaded++;
        if (loaded === scripts.length) {
          fbApp = firebase.initializeApp(FIREBASE_CONFIG);
          fbAuth = firebase.auth();
          fbDb = firebase.firestore();
          resolve();
        }
      };
      s.onerror = reject;
      document.head.appendChild(s);
    });
  });
}

function showLoginScreen() {
  var appEl = document.getElementById('app');

  if (topbar) topbar.style.display = 'none';

  var existing = document.getElementById('login-screen');
  if (existing) existing.remove();

  var wrapper = document.createElement('div');
  wrapper.id = 'login-screen'; wrapper.setAttribute('data-netlify','false');
  wrapper.style.cssText = 'position:fixed;inset:0;background:#F1F5F9;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:inherit';
  document.body.appendChild(wrapper);

  var card = document.createElement('div'); card.setAttribute('data-ep-login','1');

  passLabel.textContent = 'Contraseña';
  var passInput = document.createElement('input');
  passInput.id = 'login-pass';
  passInput.type = 'password'; passInput.name = 'ep-pass'; passInput.setAttribute('autocomplete','current-password'); passInput.setAttribute('autocomplete','new-password'); passInput.setAttribute('data-netlify-ignore','true');
  passInput.placeholder = '••••••••';

  btn.textContent = 'Entrar';
  card.appendChild(btn);

  btn.addEventListener('click', doLogin);

function doLogin() {
  var email = document.getElementById('login-email').value.trim().toLowerCase();
  var pass  = document.getElementById('login-pass').value;
  var errEl = document.getElementById('login-error');
  var btn   = document.getElementById('login-btn');
  btn.textContent = 'Entrando...';
  btn.disabled = true;
  errEl.style.display = 'none';

  fbAuth.signInWithEmailAndPassword(email, pass)
    .then(function(cred) {
      // success handled by onAuthStateChanged
    })
    .catch(function(err) {
      var msg = err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password'
        ? 'Email o contraseña incorrectos'
        : err.code === 'auth/too-many-requests'
        ? 'Demasiados intentos. Espera un momento.'
        : 'Error: ' + err.message;
      errEl.textContent = msg;
      errEl.style.display = 'block';
      btn.textContent = 'Entrar';
      btn.disabled = false;
    });
}

function doLogout() {
  fbAuth.signOut();
}

// ── FIRESTORE DATA ────────────────────────────────────────────
function saveState() {
  // Still save locally as backup
  try { localStorage.setItem(storageKey, JSON.stringify(state)); } catch(e) {}
  // Save to Firestore
  if (!fbDb || !currentUser) return;
  fbDb.collection('app_state').doc('shared').set({
    clients:    state.clients    || [],
    jobs:       state.jobs       || [],
    candidates: state.candidates || [],
    forecast:   state.forecast   || [],
    placements: state.placements || [],
    invoices:   state.invoices   || [],
    commercial: state.commercial || [],
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy: currentUser.name
  }, { merge: true });
  // Save personal data per user
  fbDb.collection('user_data').doc(currentUser.uid).set({
    tasks:    state.tasks    || [],
    events:   state.events   || [],
    routine:  state.routine  || {},
    notas:    state.notas    || [],
    fichajes: state.fichajes || [],
    pomodoro: state.pomodoro || {},
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });
}

function loadStateFromFirestore() {
  if (!fbDb || !currentUser) return Promise.resolve();
  return Promise.all([
    fbDb.collection('app_state').doc('shared').get(),
    fbDb.collection('user_data').doc(currentUser.uid).get()
  ]).then(function(results) {
    var shared = results[0].exists ? results[0].data() : {};
    var personal = results[1].exists ? results[1].data() : {};
    // Merge with local seed if empty
    var local = loadStateLocal();
    state = {

function loadStateLocal() {
  var stored = localStorage.getItem(storageKey);
  var loaded = stored ? JSON.parse(stored) : clone(seed);
  loaded.reportProjects ||= clone(seed.reportProjects);
  loaded.pomodoro ||= clone(seed.pomodoro);

  loaded.pomodoro.activities ||= clone(seed.pomodoro.activities);
  return loaded;
}

}

function cand_uploadFile(candId, field) {
  var inp = document.createElement("input");
  inp.type = "file";
  inp.accept = ".pdf,.doc,.docx,.jpg,.png";
  inp.onchange = function() {
    var file = inp.files[0];
    if (!file) return;
    if (file.size > 5000000) { showToast("Archivo muy grande (max 5MB)"); return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var cand = state.candidates.find(function(c){return c.id===candId;});
      if (!cand) return;
      if (!cand.files) cand.files = {};
      cand.files[field] = {name: file.name, data: e.target.result, type: file.type};
      cand[field] = file.name;
      saveState();
      showToast("Archivo guardado: " + file.name);
      // refresh detail if visible
      var el = document.getElementById("cand-file-" + candId + "-" + field);
      if (el) el.innerHTML = "<span style='color:#166534;font-weight:600'>&#128196; " + file.name + "</span>" +
        " <button onclick='cand_downloadFile(\"" + candId + "\",\"" + field + "\")' style='border:none;background:none;color:#2563EB;cursor:pointer;font-size:11px;font-weight:700'>Descargar</button>" +
        " <button onclick='cand_removeFile(\"" + candId + "\",\"" + field + "\")' style='border:none;background:none;color:#94A3B8;cursor:pointer;font-size:11px'>x</button>";
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function cand_downloadFile(candId, field) {
  var cand = state.candidates.find(function(c){return c.id===candId;});
  if (!cand || !cand.files || !cand.files[field]) return;
  var f = cand.files[field];
  var a = document.createElement("a");
  a.href = f.data;
  a.download = f.name;
  a.click();
}

function cand_removeFile(candId, field) {
  var cand = state.candidates.find(function(c){return c.id===candId;});
  if (!cand) return;
  if (cand.files) delete cand.files[field];
  cand[field] = "";
  saveState();
  showToast("Archivo eliminado");
  openDetail("candidate", candId);
}

function cand_fileHtml(candId, field, label, currentVal, files) {
  var f = files && files[field];
  var content = f ?
    "<span style='color:#166534;font-weight:600'>&#128196; " + f.name + "</span>" +
    " <button onclick='cand_downloadFile(\"" + candId + "\",\"" + field + "\")' style='border:none;background:none;color:#2563EB;cursor:pointer;font-size:11px;font-weight:700'>Descargar</button>" +
    " <button onclick='cand_removeFile(\"" + candId + "\",\"" + field + "\")' style='border:none;background:none;color:#94A3B8;cursor:pointer;font-size:11px'>x</button>" :
    (currentVal ? "<span style='color:#64748B;font-size:12px'>" + currentVal + "</span> " : "<span style='color:#CBD5E1;font-size:12px'>Sin archivo</span> ") +
    "<button onclick='cand_uploadFile(\"" + candId + "\",\"" + field + "\")' style='border:1.5px solid #CBD5E1;background:#fff;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;cursor:pointer;color:#64748B'>&#128196; Subir</button>";

function showNotification(title, body) {
  if ("Notification" in window && Notification.permission==="granted") {
    new Notification(title, {body:body||""});
  } else if ("Notification" in window && Notification.permission!=="denied") {
    Notification.requestPermission().then(function(p){ if(p==="granted") new Notification(title,{body:body||""}); });
  }
  var el = document.createElement("div");
  el.style.cssText = "position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:13px 20px;border-radius:12px;font-family:Plus Jakarta Sans,sans-serif;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.22);display:flex;align-items:center;gap:10px;max-width:380px";
  el.innerHTML = "<span style='font-size:19px'>&#128276;</span><div><div>" + title + "</div>" + (body?"<div style='font-size:11px;opacity:.7;margin-top:1px'>"+body+"</div>":"") + "</div><button onclick='this.parentElement.remove()' style='background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:17px;margin-left:8px'>&times;</button>";
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentElement)el.remove();},7000);
  try {
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(880,ctx.currentTime);
    o.frequency.setValueAtTime(660,ctx.currentTime+0.1);
    o.frequency.setValueAtTime(880,ctx.currentTime+0.2);
    g.gain.setValueAtTime(0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.5);
  } catch(e){}
}
if ("Notification" in window && Notification.permission==="default") Notification.requestPermission();


function navBack() {
  window._navStack = window._navStack || [];
  if (window._navStack.length > 0) {
    var prev = window._navStack.pop();
    if (prev.view) {
      detailContext = null;
      setView(prev.view);
    } else if (prev.type && prev.id) {
      openDetail(prev.type, prev.id, true);
    } else {
      setView('dashboard');
    }
  } else {
    if (detailContext) {
      var t = detailContext.type;
      if (t==='candidate') setView('candidates');
      else if (t==='job') setView('jobs');
      else if (t==='client') setView('clients');
      else setView('dashboard');
    } else {
      setView('dashboard');
    }
  }
}

function showToast(message) {
  toast.textContent = message;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2200);
}

function getAllNavItems() {
  return navGroups.flatMap((group) => group.items.map((item) => ({ ...item, group: group.label })));
}

function renderNav() {
  nav.innerHTML = navGroups
    .map(
      (group) => `
      <div class="nav-group">
        <p class="nav-label">${group.label}</p>
        ${group.items
          .map(
            (item) => `
            <button type="button" class="${item.id === currentView ? "active" : ""}" data-view="${item.id}">
              <span class="icon">${item.icon}</span><span>${item.title}</span>
            </button>
          `,
          )
          .join("")}
      </div>
    `,
    )
    .join("");
}

function setView(view) {
  currentView = view;
  detailContext = null;
  const item = getAllNavItems().find((entry) => entry.id === view);
  title.textContent = item.title;
  eyebrow.textContent = item.group;
  quickAdd.style.display = ["dashboard", "pomodoro", "reports", "assistant"].includes(view) ? "none" : "inline-flex";
  renderNav();
  render();
}

function render() {
  if (detailContext?.type === "client") {
    renderClientDetail(detailContext.id);
    return;
  }
  if (detailContext?.type === "candidate") {
    renderCandidateDetail(detailContext.id);
    return;
  }
  if (detailContext?.type === "job") {
    renderJobDetail(detailContext.id);
    return;
  }
  const renderers = {
    dashboard: renderDashboard,
    candidates: () => renderDirectoryView("candidates"),
    clients: () => renderDirectoryView("clients"),
    jobs: renderJobs,
    tasks: renderTasks,
    calendar: renderCalendar,
    routine: renderRoutineSchedule,
    commercial: renderCommercialBoard,
    forecast: renderForecast,
    placements: renderPlacements,
    goals: renderGoals,
    pomodoro: renderPomodoro,
    reports: renderReports,
    
    notas: renderNotas,
    fichaje: renderFichaje,
    metricas: renderMetricas,
  };
  renderers[currentView]();
}

function openDetail(type, id, fromStack) {
  if (!fromStack) {
    window._navStack = window._navStack || [];
    if (detailContext && detailContext.type && detailContext.id) {
      window._navStack.push({type: detailContext.type, id: detailContext.id});
    } else if (currentView && !currentView.includes('-detail')) {
      window._navStack.push({view: currentView});
    }
  }
  detailContext = { type, id };
  currentView = type + "-detail";
  renderNav();
  quickAdd.style.display = "none";
  if (type === "client") {
    const client = state.clients.find((item) => item.id === id);
    title.textContent = client?.name || "Cliente";
    eyebrow.textContent = "Cliente";
    renderClientDetail(id);
  }
  if (type === "candidate") {
    const candidate = state.candidates.find((item) => item.id === id);
    title.textContent = candidate?.name || "Candidato";
    eyebrow.textContent = "Candidato";
    renderCandidateDetail(id);
  }
  if (type === "job") {
    const job = state.jobs.find((item) => item.id === id);
    title.textContent = job?.title || "Job";
    eyebrow.textContent = "Job";
    renderJobDetail(id);
  }
}

function calcTotals() {
  const total = state.placements.reduce((sum, item) => sum + Number(item.amount || 0), 0);
  const byConsultant = Object.fromEntries(state.goals.map((goal) => [goal.consultant, 0]));
  state.placements.forEach((placement) => {
    byConsultant[placement.consultant] = (byConsultant[placement.consultant] || 0) + Number(placement.amount || 0);
  });
  return { total, byConsultant };
}

function dash_hide(w) {
  state.dashWidgets = (state.dashWidgets||[]).filter(function(x){return x!==w;});
  saveState(); renderDashboard();
}
function dash_show(w) {
  if (!state.dashWidgets) state.dashWidgets = [];
  state.dashWidgets.push(w);
  saveState(); renderDashboard();
}
function dash_drag(event, w) {
  event.dataTransfer.setData("text/plain", w);
  window._dashDrag = w;
}
function dash_drop(event) {
  event.preventDefault();
  var from = event.dataTransfer.getData("text/plain");
  var target = event.target.closest("[data-widget]");
  if (!target || !from || target.dataset.widget===from) return;
  var to = target.dataset.widget;
  var ws = state.dashWidgets||[];
  var fi = ws.indexOf(from); var ti = ws.indexOf(to);
  if (fi<0||ti<0) return;
  ws.splice(fi,1); ws.splice(ti,0,from);
  saveState(); renderDashboard();
}

function countClientJobs(client) {
  if (!client.jobs) return 0;
  return client.jobs.split(",").map((job) => job.trim()).filter(Boolean).length;
}

  const specialties = ["Todas", ...new Set(state.candidates.map((candidate) => candidate.specialty).filter(Boolean))];
  const myName = currentUser ? currentUser.name : '';
  let items = state[key].filter((item) => matchesDirectoryFilter(key, item, filter) && (key !== "candidates" || specialtyFilter === "Todas" || item.specialty === specialtyFilter));
  // Filtro Míos/Todos para candidatos (por owner o jobs que incluye el nombre)
  if (key === 'candidates' && miosFilter === 'Mios') {
    items = items.filter(function(c) {
      return !c.owner || c.owner === myName;
    });
  }
  app.innerHTML = `
    <div class="directory-toolbar">
      <div class="search-wrap">
        <span>⌕</span>
        <input class="search directory-search" type="search" placeholder="${config.placeholder}" data-search="${key}" />
      </div>
      ${key === 'candidates' ? `<div style="display:flex;gap:6px">
        <button class="ghost-button" style="height:34px;font-size:12px;padding:0 12px;${miosFilter==='Mios'?'background:#0A1F5C;color:#fff;border-color:#0A1F5C':''}" type="button" data-scope-filter="${key}:Mios">Míos</button>
        <button class="ghost-button" style="height:34px;font-size:12px;padding:0 12px;${miosFilter==='Todos'?'background:#0A1F5C;color:#fff;border-color:#0A1F5C':''}" type="button" data-scope-filter="${key}:Todos">Todos</button>
      </div>` : ''}
      <div class="segmented">
        ${config.filters.map((entry) => `<button class="${entry === filter ? "active" : ""}" type="button" data-filter="${key}:${entry}">${entry}</button>`).join("")}
      </div>
      ${key === "candidates" ? `<select class="search compact-select" data-specialty-filter>${specialties.map((entry) => `<option value="${entry}" ${entry === specialtyFilter ? "selected" : ""}>${entry}</option>`).join("")}</select>` : ""}
      <button class="primary-button directory-add" type="button" data-add="${key}">${config.addLabel}</button>
    </div>
    <div class="directory-grid">
      ${items.map((item) => renderDirectoryCard(key, item, config)).join("") || `<div class="panel panel-body">${empty("No hay resultados con este filtro")}</div>`}
    </div>
  `;
}

function matchesDirectoryFilter(key, item, filter) {
  const status = (item.status || "").toLowerCase();
  if (filter === "Todos") return true;
  if (key === "clients") {
    if (filter === "Activos") return status === "activo" || status === "";
    if (filter === "Pausados") return status === "pausado";
    if (filter === "Cerrados") return status === "cerrado";
  }
  if (filter === "Entrevista") return status === "entrevista" || status === "entrevista c/c";
  if (filter === "Oferta") return status === "oferta";
  if (filter === "Volver a contactar") return status === "volver a contactar";
  return true;
}

function jobStatusColor(s){
  if(!s||s==="Abierto") return "#22C55E";
  if(s==="Standby") return "#94A3B8";
  if(s==="Cancelado") return "#EF4444";
  if(s==="Facturado") return "#2563EB";
  return "#94A3B8";
}
function statusClass(status) {
  const value = (status || "").toLowerCase();
  if (["pausado", "media", "contactado"].includes(value)) return "yellow";
  if (["cerrado", "descartado", "alta"].includes(value)) return "red";
  if (["activo", "prioritario", "entrevista", "oferta"].includes(value)) return "green";
  return "";
}

function renderDirectoryCard(key, item, config) {
  const status = config.status(item);
  const detailType = key === "clients" ? "client" : "candidate";
  return `
    <article class="directory-card" data-card="${item.id}" data-open-detail="${detailType}:${item.id}">
      <div class="card-accent"></div>
      <div class="directory-card-head">
        <h2>${item.name}</h2>
        <span class="status-badge ${statusClass(status)}">${status}</span>
      </div>
      <dl>
        ${config.meta(item).map(([label, value]) => `<div><dt>${label}</dt><dd>${value}</dd></div>`).join("")}
      </dl>
      <p>${config.foot(item)}</p>
      <div class="directory-actions">
        <button class="ghost-button" type="button" data-edit="${key}:${item.id}">Editar</button>
        <button class="icon-button" type="button" title="Eliminar" data-delete="${key}:${item.id}">×</button>
      </div>
    </article>
  `;
}

function renderTableView(key) {
  const schema = schemas[key];
  app.innerHTML = `
    <div class="toolbar">
      <input class="search" type="search" placeholder="Buscar en ${schema.title.toLowerCase()}..." data-search="${key}" />

    </div>

      <table>
        <thead><tr>${schema.columns.map(([, label]) => `<th>${label}</th>`).join("")}<th></th></tr></thead>

          ${state[key].map((row) => renderRow(key, row)).join("")}

function optionList(items, selected) {
  return items.map((item) => `<option value="${item}" ${item === selected ? "selected" : ""}>${item}</option>`).join("");
}

const quarters = {
  Q1: ["Enero", "Febrero", "Marzo"],
  Q2: ["Abril", "Mayo", "Junio"],
  Q3: ["Julio", "Agosto", "Septiembre"],
  Q4: ["Octubre", "Noviembre", "Diciembre"],
};

function getPlacementsForMonths(months) {
  return state.placements.filter((placement) => months.includes(placement.month));
}

function sumAmount(items) {
  return items.reduce((sum, item) => sum + Number(item.amount || 0), 0);
}

function groupAmounts(items, field) {
  const grouped = {};
  items.forEach((item) => {
    const key = item[field] || "Sin dato";
    grouped[key] = (grouped[key] || 0) + Number(item.amount || 0);
  });
  return Object.entries(grouped).sort((a, b) => b[1] - a[1]);
}

function renderMiniBars(entries, total) {
  return entries.slice(0, 5).map(([label, amount]) => `
    <div class="mini-bar">
      <div><span>${label}</span><strong>${money(amount)}</strong></div>
      <i><b style="width:${total ? Math.round((amount / total) * 100) : 0}%"></b></i>
    </div>
  `).join("") || empty("Sin datos todavía");
}

function renderBillingDashboard(items = state.placements) {
  const total = sumAmount(items);
  const byConsultant = groupAmounts(items, "consultant");
  const byClient = groupAmounts(items, "client");
  const byMonth = groupAmounts(items, "month");
  const topConsultant = byConsultant[0]?.[0] || "-";
  const topClient = byClient[0]?.[0] || "-";
  return `
    <section class="billing-dashboard">
      <article class="billing-total">
        <span>Facturación</span>
        <strong>${money(total)}</strong>
        <small>${items.length} registros</small>
      </article>
      <article class="billing-chart">
        <h2>Por consultor</h2>
        ${renderMiniBars(byConsultant, total)}
      </article>
      <article class="billing-chart">
        <h2>Por cliente</h2>
        ${renderMiniBars(byClient, total)}
      </article>
      <article class="billing-chart">
        <h2>Por mes</h2>
        ${renderMiniBars(byMonth, total)}
      </article>
      <article class="billing-insights">
        <div><span>Top consultor</span><strong>${topConsultant}</strong></div>
        <div><span>Top cliente</span><strong>${topClient}</strong></div>
      </article>
    </section>
  `;
}

    forecastContext.quarter ? quarters[forecastContext.quarter] : MONTHS;
  var record = (state.forecast||[]).find(function(f){return f.id===id;}) ||
    {id:uid(), title:"", consultor:"Santi", month:forecastContext.month||MONTHS[new Date().getMonth()], amount:"", jobId:"", candId:"", billed:false, notas:""};

  var conOpts = CONSULTORES.map(function(c){return "<option"+(record.consultor===c?" selected":"")+">"+c+"</option>";}).join("");

  var clientOpts = "<option value=''>-- Seleccionar cliente --</option>" +
    state.clients.map(function(c){return "<option value='"+c.name.replace(/'/g,"&#39;")+"'"+(record.clientName===c.name?" selected":"")+">"+c.name+"</option>";}).join("");

  // Jobs filtered by selected client
  var clientForJobs = record.clientName || "";

    : state.jobs;
  var jOpts = "<option value=''>-- Sin job --</option>" +
    filteredJobs.map(function(j){return "<option value='"+j.id+"'"+(record.jobId===j.id?" selected":"")+">"+j.title+"</option>";}).join("") +

        "<button class='icon-button' type='button' data-close-modal>&times;</button></div>" +
      "<form class='panel-body form-grid'>" +
        "<div class='field'><label>Titulo</label><input name='title' value='"+(record.title||"").replace(/'/g,"&#39;")+"' placeholder='Nombre del job'/></div>" +
        "<div class='field'><label>Consultor</label><select name='consultor'>"+conOpts+"</select></div>" +
        "<div class='field'><label>Mes</label><select name='month'>"+mOpts+"</select></div>" +
        "<div class='field'><label>Importe</label><input name='amount' type='number' value='"+(record.amount||"")+"'/></div>" +
        "<div class='field full'><label>Cliente</label><select name='clientName' id='fc-client-"+record.id+"' onchange='fc_filterJobs(this,\"fc-job-"+record.id+"\",\"fc-cand-"+record.id+"\")'>" + clientOpts + "</select></div>" +
        "<div class='field full'><label>Job vinculado</label><select name='jobId' id='fc-job-"+record.id+"' onchange='fc_filterCands(this,\"fc-cand-"+record.id+"\")'>" + jOpts + "</select></div>" +
        "<div class='field full'><label>Candidato</label><select name='candId' id='fc-cand-"+record.id+"'>" + cOpts + "</select></div>" +
        "<div class='field full'><label>Notas</label><textarea name='notas' style='width:100%;min-height:60px;padding:8px;border:1.5px solid #CBD5E1;border-radius:8px;font-family:inherit;resize:vertical'>"+(record.notas||"")+"</textarea></div>" +
      "</form>" +
      "<div class='modal-footer'>" +
        "<button class='ghost-button' type='button' data-close-modal>Cancelar</button>" +
        "<button class='primary-button' type='button' data-save-fc>Guardar</button>" +
      "</div>" +
    "</div>";
  document.body.appendChild(modal);
  modal.querySelector("[data-save-fc]").addEventListener("click", function() {
    var form = modal.querySelector("form");
    var data = Object.fromEntries(new FormData(form).entries());
    var updated = Object.assign({}, record, data, {amount: parseFloat(data.amount||0), billed: record.billed||false});
    if (!state.forecast) state.forecast = [];
    var idx = state.forecast.findIndex(function(f){return f.id===id;});
    if (idx>=0) state.forecast[idx]=updated; else state.forecast.push(updated);
    if (updated.jobId && updated.jobId!=="otros") {
      var job = state.jobs.find(function(j){return j.id===updated.jobId;});
      if (job && !job.forecastMonth) job.forecastMonth = updated.month;
    }
    saveState(); modal.remove(); renderForecast();
    showToast("Forecast guardado");
  });
  modal.addEventListener("click", function(e){
    if (e.target.matches("[data-close-modal]")||e.target===modal) modal.remove();
  });
}

  var jobs = clientName

    jobs.map(function(j){return "<option value='"+j.id+"'>"+j.title+"</option>";}).join("") +

}

function fc_filterCands(jobSel, candSelId) {
  var jobId = jobSel.value;

    ? state.candidates.filter(function(c){

var forecastContext = {};

function fc_addItem() {
  if (!state.forecast) state.forecast = [];
  var MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  var month = forecastContext.month || MONTHS[new Date().getMonth()];
  state.forecast.push({id:uid(), title:"Nuevo item", jobId:"", candId:"", consultor:"Santi", amount:0, month:month, billed:false});
  saveState();
  renderForecast();
}

function fc_upd(id, field, val) {
  var f=(state.forecast||[]).find(function(x){return x.id===id;});
  if(!f) return;
  f[field] = field==="amount" ? parseFloat(val)||0 : val;
  if(field==="jobId" && val && val!=="otros") {
    var job=state.jobs.find(function(j){return j.id===val;});
    if(job){ f.title=job.title; f.consultor=job.owner||"Santi"; if(!f.amount&&job.fee) f.amount=job.fee; }
  }
  saveState();
}

function fc_del(id) {
  if(!confirm("Eliminar este item?")) return;
  state.forecast=(state.forecast||[]).filter(function(x){return x.id!==id;});
  saveState(); renderForecast();
}

function fc_bill(id) {
  var f=(state.forecast||[]).find(function(x){return x.id===id;});
  if(!f) return;
  f.billed=true;
  var inv=parseFloat(f.amount)||0;
  if(inv>0){
    var exists=state.placements.find(function(p){return p.job===f.title&&p.month===f.month;});
    if(!exists) state.placements.push({id:uid(),consultant:f.consultor,month:f.month,amount:inv,client:f.clientName||"",job:f.title,date:new Date().toISOString().split("T")[0]});
  }
  if(f.jobId && f.jobId!=="otros"){
    var job=state.jobs.find(function(j){return j.id===f.jobId;});
    if(job){job.jobStatus="Facturado";job.billingMonth=f.month;}
  }
  // Mark candidate as facturado
  if(f.candId){
    var cand=state.candidates.find(function(c){return c.id===f.candId;});
    if(cand) cand.facturado=true;
  }
  saveState(); renderForecast();
  showToast("Facturado en "+f.month+" y pasado a Facturacion");
}

function fc_unbill(id) {
  var f=(state.forecast||[]).find(function(x){return x.id===id;});
  if(!f) return;
  f.billed=false;
  // Also remove placement created from this forecast item
  state.placements = state.placements.filter(function(p){
    return !(p.job===f.title && p.month===f.month);
  });
  // Revert job status
  if(f.jobId && f.jobId!=="otros"){
    var job=state.jobs.find(function(j){return j.id===f.jobId;});
    if(job && job.jobStatus==="Facturado"){ job.jobStatus="Abierto"; job.billingMonth=null; }
  }
  saveState(); renderForecast();
  showToast("Facturado revertido y placement eliminado");
}

function renderPlacements() {
  var isAdmin = currentUser && currentUser.role === 'admin';
  var myName = currentUser ? currentUser.name : '';
  var plScope = window._plScope || 'Mios';
  var plConsultor = window._plConsultor || myName;
  var CONSULTORES = ["Santi","Alba","Cori","Esteve"];

  function filterPl(items) {
    if (plScope === 'Todos' && (!isAdmin || plConsultor === 'Todos')) return items;
    if (plScope === 'Mios') return items.filter(function(p){ return p.consultant === myName; });
    return items.filter(function(p){ return p.consultant === plConsultor; });
  }

  var scopeBtns = "<div style='display:flex;gap:6px;align-items:center'>" +
    "<button type='button' onclick='window._plScope=\"Mios\";renderPlacements()' style='height:30px;padding:0 11px;border-radius:20px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid "+(plScope==="Mios"?"#0A1F5C":"#CBD5E1")+";background:"+(plScope==="Mios"?"#0A1F5C":"#fff")+";color:"+(plScope==="Mios"?"#fff":"#64748B")+"'>Míos</button>" +
    "<button type='button' onclick='window._plScope=\"Todos\";window._plConsultor=\"Todos\";renderPlacements()' style='height:30px;padding:0 11px;border-radius:20px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid "+(plScope==="Todos"?"#0A1F5C":"#CBD5E1")+";background:"+(plScope==="Todos"?"#0A1F5C":"#fff")+";color:"+(plScope==="Todos"?"#fff":"#64748B")+"'>Todos</button>" +
  "</div>";

  var consultorBtns = (isAdmin && plScope === 'Todos') ? "<div style='display:flex;gap:5px;flex-wrap:wrap'>" +
    ["Todos",...CONSULTORES].map(function(c){
      var act = plConsultor===c;
      return "<button type='button' onclick='window._plConsultor=\""+c+"\";renderPlacements()' style='height:26px;padding:0 9px;border-radius:20px;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid "+(act?"#2563EB":"#CBD5E1")+";background:"+(act?"#2563EB":"#fff")+";color:"+(act?"#fff":"#64748B")+"'>"+c+"</button>";
    }).join("") + "</div>" : "";

  if (!placementContext.quarter) {
    app.innerHTML = `
      <div class="toolbar">
        <div style="display:flex;flex-direction:column;gap:8px">
          <p style="margin:0;color:var(--muted)">Elige un trimestre para ver los meses y la facturación.</p>

        </div>

      </div>
      ${renderBillingDashboard(filterPl(state.placements))}
      <div class="quarter-grid">
        ${Object.entries(quarters).map(([quarter, months]) => {
          const items = filterPl(getPlacementsForMonths(months));
          const total = sumAmount(items);
          return `<button class="quarter-card" type="button" data-placement-quarter="${quarter}">
            <span>${quarter}</span>
            <strong>${money(total)}</strong>
            <small>${months.join(" · ")} · ${items.length} registros</small>
          </button>`;
        }).join("")}
      </div>
    `;
    return;
  }

  if (!placementContext.month) {
    const months = quarters[placementContext.quarter];
    app.innerHTML = `
      <div class="toolbar">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="ghost-button" type="button" data-placement-back="quarters">← Trimestres</button>
          ${scopeBtns}${consultorBtns}
        </div>
        <button class="primary-button" type="button" data-add="placements">Añadir facturación</button>
      </div>
      ${renderBillingDashboard(filterPl(getPlacementsForMonths(months)))}
      <div class="month-grid">
        ${months.map((month) => {
          const items = filterPl(getPlacementsForMonths([month]));
          const total = sumAmount(items);
          return `<button class="month-card" type="button" data-placement-month="${month}">
            <span>${month}</span>
            <strong>${money(total)}</strong>
            <small>${items.length} registros</small>
          </button>`;
        }).join("")}
      </div>
    `;
    return;
  }

  const items = filterPl(getPlacementsForMonths([placementContext.month]));
  app.innerHTML = `
    <div class="toolbar">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="ghost-button" type="button" data-placement-back="months">← Meses</button>
        ${scopeBtns}${consultorBtns}
        <input class="search" type="search" placeholder="Buscar en ${placementContext.month}..." data-search="placements" />
      </div>
      <button class="primary-button" type="button" data-add="placements">Añadir facturación</button>
    </div>
    ${renderBillingDashboard(items)}
    <div class="table-wrap">
      <table>
        <thead><tr><th>Consultor</th><th>Importe</th><th>Cliente</th><th>Job</th><th></th></tr></thead>
        <tbody>
          ${items.map((row) => `
            <tr data-row="${row.id}">
              <td>${row.consultant}</td>
              <td>${money(Number(row.amount))}</td>
              <td>${row.client}</td>
              <td>${row.job}</td>
              <td><div class="row-actions">
                <button class="icon-button" type="button" title="Editar" data-edit="placements:${row.id}">✎</button>

        </tbody>
      </table>

  `;
}

function findJobsForClient(clientName) {
  return state.jobs.filter((job) => normalize(job.client) === normalize(clientName));
}

function findCandidatesForJob(jobTitle) {
  return state.candidates.filter((candidate) => normalize(candidate.jobs).includes(normalize(jobTitle)));
}

function normalize(value) {
  return String(value || "").toLowerCase().trim();
}

function renderCandCallNotes(candidate) {
  var colors = ["#FEF9C3","#DCFCE7","#EFF6FF","#F3E8FF"];
  var notes = (candidate.callNotes||[]);
  var cid = candidate.id;
  var notesHtml = "";
  for (var i=0; i<notes.length; i++) {
    var n = notes[i];
    var color = colors[i%4];
    var taId = "cn-" + cid + "-" + i;
    var btnId = "cn-save-" + cid + "-" + i;
    // Use data attributes to avoid quote nesting
    notesHtml +=
      '<div style="background:'+color+';border-radius:10px;padding:12px;margin-bottom:8px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">' +
          '<span style="font-size:11px;color:#94A3B8;font-weight:600">'+n.date+'</span>' +
          '<button data-cand-del-note="'+cid+'|'+i+'" style="border:none;background:none;color:#CBD5E1;cursor:pointer;font-size:15px;padding:0">&times;</button>' +
        '</div>' +
        '<textarea id="'+taId+'" data-cand-note="'+cid+'|'+i+'" ' +
          'style="width:100%;min-height:55px;padding:5px;border:none;background:transparent;font-family:inherit;font-size:13px;color:#1E293B;resize:vertical;outline:none">'+
          (n.text||"").replace(/</g,"&lt;").replace(/>/g,"&gt;") +
        '</textarea>' +
        '<button id="'+btnId+'" data-cand-save-note="'+cid+'|'+i+'" ' +
          'style="display:none;height:26px;padding:0 10px;background:#0A1F5C;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit">Guardar</button>' +
      '</div>';
  }
  if (!notes.length) notesHtml = '<p style="color:#94A3B8;font-size:13px;margin:0">Sin notas todavia. Apreta + Nota.</p>';
  var addBtn = '<button data-cand-add-note="'+cid+'" style="height:30px;font-size:12px;padding:0 12px;border:1.5px solid #CBD5E1;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;background:#fff">+ Nota</button>';
  return '<section class="panel" style="margin-top:14px">' +
    '<div class="panel-header"><h2 class="panel-title">&#128222; Notas de llamadas</h2>' + addBtn + '</div>' +
    '<div class="panel-body">'+notesHtml+'</div>' +
  '</section>';
}

function renderRow(key, row) {
  const schema = schemas[key];
  return `
    <tr data-row="${row.id}">
      ${schema.columns
        .map(([field]) => {
          const value = field === "amount" ? money(Number(row[field])) : row[field] || "";
          const className = field === "status" ? `pill ${row[field] === "Pendiente" ? "red" : ""}` : "";
          return `<td>${className ? `<span class="${className}">${value}</span>` : value}</td>`;
        })
        .join("")}
      <td><div class="row-actions"><button class="icon-button" type="button" title="Editar" data-edit="${key}:${row.id}">✎</button><button class="icon-button" type="button" title="Eliminar" data-delete="${key}:${row.id}">×</button></div></td>
    </tr>
  `;
}

function renderJobs() {
  var sf = window._jobStatusFilter || "Todos";
  var jobScope = window._jobScope || "Mios";
  var myName = currentUser ? currentUser.name : '';
  var stages = ["Busqueda","Contactado","Entrevista","Entrevista C/C","Oferta"];
  var statuses = ["Todos","Abierto","Standby","Cancelado","Facturado"];

  var filterHtml = statuses.map(function(s){
    var a = sf===s;
    var style = a ? "border:1.5px solid #0A1F5C;background:#0A1F5C;color:#fff;" : "border:1.5px solid #CBD5E1;background:#fff;color:#64748B;";
    return "<button type='button' style='height:30px;padding:0 11px;border-radius:20px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;" + style + "' data-job-filter='" + s + "'>" + s + "</button>";
  }).join("");

  var scopeHtml = "<div style='display:flex;gap:6px'>" +
    "<button type='button' style='height:30px;padding:0 11px;border-radius:20px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;" + (jobScope==="Mios"?"border:1.5px solid #0A1F5C;background:#0A1F5C;color:#fff;":"border:1.5px solid #CBD5E1;background:#fff;color:#64748B;") + "' onclick='window._jobScope=\"Mios\";renderJobs()'>Míos</button>" +
    "<button type='button' style='height:30px;padding:0 11px;border-radius:20px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;" + (jobScope==="Todos"?"border:1.5px solid #0A1F5C;background:#0A1F5C;color:#fff;":"border:1.5px solid #CBD5E1;background:#fff;color:#64748B;") + "' onclick='window._jobScope=\"Todos\";renderJobs()'>Todos</button>" +
  "</div>";

  var jobs = state.jobs.filter(function(j){
    var statusOk = sf==="Todos" || (j.jobStatus||"Abierto")===sf;
    var scopeOk = jobScope==="Todos" || j.owner===myName;
    return statusOk && scopeOk;
  });

  var cards = jobs.map(function(job){
    var color = jobStatusColor(job.jobStatus||"Abierto");
    var fee = parseFloat(job.feePercent||0);
    var sal = parseFloat(job.salaryAgreed||0);
    var inv = (fee&&sal) ? Math.round(fee/100*sal) : 0;
    var invTxt = inv ? " \u00b7 " + inv.toLocaleString("es-ES") + " \u20ac" : "";
    var pills = stages.map(function(st){
      var cnt = (job.pipeline||[]).filter(function(p){return p.stage===st;}).length;
      return cnt ? "<span style='font-size:10px;font-weight:700;padding:2px 7px;background:#F1F5F9;border-radius:20px;color:#64748B'>" + st + ": " + cnt + "</span>" : "";
    }).join("");
    return "<section class='panel job-panel' data-open-detail='job:" + job.id + "' style='border-left:5px solid " + color + ";cursor:pointer'>" +
      "<div class='panel-header'>" +
        "<div><div style='display:flex;align-items:center;gap:7px;margin-bottom:3px'>" +
          "<span style='width:9px;height:9px;border-radius:50%;background:" + color + ";flex-shrink:0;display:inline-block'></span>" +
          "<h2 class='panel-title' style='margin:0'>" + job.title + "</h2></div>" +
          "<p style='margin:0;color:var(--muted);font-size:12px'>" + job.client + " \u00b7 " + job.owner + invTxt + "</p></div>" +
        "<div class='row-actions' onclick='event.stopPropagation()'>" +
          "<button class='icon-button' title='Editar' data-edit-job='" + job.id + "'>\u270e</button>" +
          "<button class='icon-button' title='Eliminar' data-delete-job='" + job.id + "'>\u00d7</button>" +
        "</div></div>" +
      "<div class='panel-body' style='padding-top:5px'><div style='display:flex;gap:5px;flex-wrap:wrap'>" + pills + "</div></div>" +
    "</section>";
  }).join("") || "<p style='color:var(--muted);padding:18px'>Sin jobs.</p>";

  app.innerHTML =
    "<div class='toolbar'>" +
      "<div style='display:flex;gap:7px;align-items:center;flex-wrap:wrap'>" +
        "<input class='search' type='search' placeholder='Buscar job...' data-search='jobs' style='width:190px'/>" +
        scopeHtml +
        "<div style='display:flex;gap:5px;flex-wrap:wrap'>" + filterHtml + "</div>" +
      "</div>" +
      "<button class='primary-button' type='button' data-add-job>+ Nuevo job</button>" +
    "</div>" +
    "<div class='grid two'>" + cards + "</div>";
}

  var JOB_STATUSES = ["Abierto","Standby","Cancelado","Facturado"];
  var LABELS = {"En proceso":["#DCFCE7","#166534"],"Placement":["#DBEAFE","#1E40AF"],"No presentado":["#F1F5F9","#64748B"],"Rechazado":["#FEE2E2","#991B1B"]};
  var color = jobStatusColor(job.jobStatus||"Abierto");

  var fee = parseFloat(job.feePercent||0);
  var sal = parseFloat(job.salaryAgreed||0);
  var inv = (fee&&sal) ? Math.round(fee/100*sal) : 0;

  // Status selector
  var statusOpts = JOB_STATUSES.map(function(s){
    return "<option" + ((job.jobStatus||"Abierto")===s?" selected":"") + ">" + s + "</option>";
  }).join("");

  // Month pickers
  var monthOpts = months.map(function(m,i){
    return "<div onclick='jd_month(\"" + id + "\",\"forecast\",\"" + m + "\")' style='padding:5px 9px;cursor:pointer;font-size:12px;font-weight:600;border-radius:5px' onmouseover='this.style.background=\"#EFF6FF\"' onmouseout='this.style.background=\"\"'>" + m + "</div>";
  }).join("");
  var monthOptsBill = months.map(function(m,i){
    return "<div onclick='jd_month(\"" + id + "\",\"billing\",\"" + m + "\")' style='padding:5px 9px;cursor:pointer;font-size:12px;font-weight:600;border-radius:5px' onmouseover='this.style.background=\"#EFF6FF\"' onmouseout='this.style.background=\"\"'>" + m + "</div>";
  }).join("");

  // Pipeline columns
  var pipelineHtml = stages.map(function(stage){
    var cards = (job.pipeline||[]).filter(function(p){return p.stage===stage;}).map(function(p){
      var lbl = p.label||"En proceso";

function jd_status(jobId,val){
  var j=state.jobs.find(function(x){return x.id===jobId;});
  if(j){j.jobStatus=val;saveState();renderJobDetail(jobId);}
}

function jd_calc(jobId){
  var j=state.jobs.find(function(x){return x.id===jobId;});
  if(!j) return;
  var f=parseFloat(document.getElementById("fp-"+jobId).value)||0;
  var s=parseFloat(document.getElementById("sp-"+jobId).value)||0;
  j.feePercent=f; j.salaryAgreed=s; j.fee=f&&s?Math.round(f/100*s):0;
  var el=document.getElementById("inv-"+jobId);
  if(el) el.textContent=j.fee?j.fee.toLocaleString("es-ES")+" \u20ac":"\u2014";
  saveState();
}

function jd_togglePicker(pid){
  var el=document.getElementById(pid);
  if(!el) return;
  var wasOpen=el.style.display!=="none";
  document.querySelectorAll("[id^='fp-'][id$='-fc'],[id^='fp-'][id$='-bl']").forEach(function(e){e.style.display="none";});
  el.style.display=wasOpen?"none":"block";
}

function jd_month(jobId,type,month){
  var j=state.jobs.find(function(x){return x.id===jobId;});
  if(!j) return;
  var inv = j.fee || Math.round((parseFloat(j.feePercent||0)/100)*(parseFloat(j.salaryAgreed||0)));
  if(type==="forecast"){
    j.forecastMonth=month;
    // Auto-add to state.forecast if not already there
    if(!state.forecast) state.forecast=[];
    var fcExists=state.forecast.find(function(f){return f.jobId===jobId&&f.month===month;});
    if(!fcExists){
      state.forecast.push({
        id:uid(), title:j.title, jobId:jobId, clientName:j.client,
        consultor:j.owner||"Santi", amount:inv, month:month,
        billed:false, notas:""
      });
    }
    showToast("Forecast: "+month+" — añadido a la sección Forecast");
  } else {
    j.billingMonth=month;
    j.jobStatus="Facturado";
    if(inv>0){
      var exists=state.placements.find(function(p){return p.job===j.title&&p.month===month;});
      if(!exists) state.placements.push({id:uid(),consultant:j.owner||"Santi",month:month,amount:inv,client:j.client,job:j.title,date:new Date().toISOString().split("T")[0]});
    }
    // Also mark forecast as billed if exists
    if(state.forecast){
      var fc=state.forecast.find(function(f){return f.jobId===jobId;});
      if(fc) fc.billed=true;
    }
    showToast("Facturado en "+month+" — añadido a Facturación");
  }
  saveState();
  document.querySelectorAll("[id^='fp-'][id$='-fc'],[id^='fp-'][id$='-bl']").forEach(function(e){e.style.display="none";});
  renderJobDetail(jobId);
}

function jd_clearMonth(jobId, type) {
  var j = state.jobs.find(function(x){return x.id===jobId;});
  if (!j) return;
  if (type === "forecast") {
    j.forecastMonth = null;
    // Also remove forecast items for this job
    state.forecast = (state.forecast||[]).filter(function(f){return f.jobId!==jobId;});
    showToast("Forecast eliminado");
  } else {
    var prevMonth = j.billingMonth;
    j.billingMonth = null;
    j.jobStatus = "Abierto";
    // Remove placements created from this job (use saved month)
    if (prevMonth) {
      state.placements = state.placements.filter(function(p){
        return !(normalize(p.job)===normalize(j.title) && p.month===prevMonth);
      });
    }
    showToast("Facturacion eliminada y placement revertido");
  }
  saveState();
  renderJobDetail(jobId);
}

function jd_dragStart(event,jobId,name){
  event.dataTransfer.setData("text/plain",JSON.stringify({jobId:jobId,name:name}));
}

function jd_drop(event,jobId,stage){
  event.preventDefault();
  event.currentTarget.style.background="#F8FAFD";
  try{
    var d=JSON.parse(event.dataTransfer.getData("text/plain"));
    if(d.jobId!==jobId) return;
    var j=state.jobs.find(function(x){return x.id===jobId;});
    if(!j) return;
    var p=j.pipeline.find(function(x){return x.name===d.name;});
    if(p){p.stage=stage;saveState();renderJobDetail(jobId);}
  }catch(e){}
}

function jd_label(jobId,name,label){
  var j=state.jobs.find(function(x){return x.id===jobId;});
  if(!j) return;
  var p=j.pipeline.find(function(x){return x.name===name;});
  if(p){p.label=label;saveState();renderJobDetail(jobId);}
}

function jd_remove(jobId,name){
  var j=state.jobs.find(function(x){return x.id===jobId;});
  if(!j) return;
  j.pipeline=j.pipeline.filter(function(x){return x.name!==name;});
  saveState();renderJobDetail(jobId);
}

function renderTaskLink(value) {
  const relation = findRelation(value);
  if (!relation) return value || "Sin relacion";
  return `<button class="text-link" type="button" data-open-detail="${relation.type}:${relation.id}">${value}</button>`;
}

function findRelation(value) {
  const target = normalize(value);
  if (!target) return null;
  const client = state.clients.find((item) => target.includes(normalize(item.name)));
  if (client) return { type: "client", id: client.id };
  const job = state.jobs.find((item) => target.includes(normalize(item.title)));
  if (job) return { type: "job", id: job.id };
  const candidate = state.candidates.find((item) => target.includes(normalize(item.name)));
  if (candidate) return { type: "candidate", id: candidate.id };
  return null;
}

      </section>
      <section class="focus-options">

          <strong>Actividades</strong>
          <button class="ghost-button" type="button" data-add-focus-activity>Nueva</button>
        </div>
        ${modes.map((mode) => `
          <article class="focus-card ${state.pomodoro.mode === mode.name ? "active" : ""}">
            <button type="button" data-focus-mode="${mode.id}">
              <strong>${mode.name}</strong>

            </div>
          </article>
        `).join("")}
      </section>
    </div>
  `;
  if (state.pomodoro.running) startTimer();
}

function startTimer() {
  timerHandle = setInterval(() => {
    state.pomodoro.remaining = Math.max(state.pomodoro.remaining - 1, 0);
    if (state.pomodoro.remaining === 0) {
      state.pomodoro.running = false;
      showToast("Bloque terminado");
    }
    saveState();
    renderPomodoro();
  }, 1000);
}

function openModal({ title, fields, values = {}, onSave }) {
  const modal = document.createElement("div");
  modal.className = "modal show";
  modal.innerHTML = `
    <div class="modal-card">
      <div class="panel-header"><h2 class="panel-title">${title}</h2><button class="icon-button" type="button" data-close-modal>×</button></div>
      <form class="panel-body form-grid">
        ${fields
          .map(([name, label, type, options]) => {
            type = type || "text";
            const value = values[name] ?? "";
            if (type === "textarea") return `<div class="field full"><label>${label}</label><textarea name="${name}">${value}</textarea></div>`;
            if (type === "select" && options) {
              const opts = options.map(o => `<option ${value===o?"selected":""}>${o}</option>`).join("");
              const onchg = name === "status" ? ` onchange="modal_onStatusChange(this)"` : "";
              return `<div class="field"><label>${label}</label><select name="${name}"${onchg}>${opts}</select></div>`;
            }
            if (name === "cv") {
              const fileId = "cv-upload-" + Math.random().toString(36).slice(2);
              return `<div class="field full"><label>${label}</label>
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  <input name="${name}" id="${fileId}-txt" type="text" value="${value}" placeholder="Nombre del archivo o sube uno" style="flex:1"/>
                  <button type="button" onclick="modal_uploadCV('${fileId}')" style="height:36px;padding:0 12px;border:1.5px solid #CBD5E1;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;font-family:inherit">&#128196; Subir CV</button>
                </div>
                <input type="file" id="${fileId}-file" accept=".pdf,.doc,.docx" style="display:none"/>
                <div id="${fileId}-status" style="font-size:11px;color:#166534;margin-top:4px;display:none"></div>
              </div>`;
            }
            if (type === "datetime-local" && name === "contactarFecha") {
              const visible = values.status === "Volver a contactar";
              return `<div class="field full contactar-fields" style="display:${visible?"block":"none"};background:#F3E8FF;border:1.5px solid #DDD6FE;border-radius:10px;padding:12px"><label style="color:#7C3AED;font-weight:700">&#128276; Volver a contactar — fecha y hora</label><input name="${name}" type="datetime-local" value="${value}" style="margin-top:6px;width:100%;height:36px;padding:0 10px;border:1.5px solid #CBD5E1;border-radius:8px;font-family:inherit"/><div style="font-size:11px;color:#64748B;margin-top:3px">Recibirás un aviso en esta fecha</div></div>`;
            }
            if (name === "contactarNotas") {
              const visible = values.status === "Volver a contactar";
              return `<div class="field full contactar-fields" style="display:${visible?"block":"none"}"><label>Nota para ese contacto</label><input name="${name}" type="text" value="${value}" placeholder="Ej: Llama después de vacaciones..."/></div>`;
            }
            return `<div class="field"><label>${label}</label><input name="${name}" type="${type}" value="${value}" /></div>`;
          })
          .join("")}
      </form>
      <div class="modal-footer"><button class="ghost-button" type="button" data-close-modal>Cancelar</button><button class="primary-button" type="button" data-save-modal>Guardar</button></div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.querySelector("[data-save-modal]").addEventListener("click", () => {
    const data = Object.fromEntries(new FormData(modal.querySelector("form")).entries());
    onSave(data);
    saveState();
    modal.remove();
    render();
    showToast("Guardado");
    // Schedule notification if due date set
    if (data.due) {
      var dueMs = new Date(data.due).getTime();
      var delay = dueMs - Date.now();
      if (delay > 0 && delay < 86400000) {
        setTimeout(function() {
          showNotification("Recordatorio: " + (data.title || data.activity || ""), data.details || data.reminder || "");
        }, delay);
      }
    }
  });
  modal.addEventListener("click", (event) => {
    if (event.target.matches("[data-close-modal]") || event.target === modal) modal.remove();
  });
}

function editRecord(key, id) {
  if (key === "placements") {
    editBilling(id);
    return;
  }
  const schema = schemas[key];
  const record = state[key].find((item) => item.id === id) || { id: uid() };
  openModal({
    title: `${record.name || record.title || record.activity ? "Editar" : "Añadir"} ${schema.title.toLowerCase()}`,
    fields: schema.fields,
    values: record,
    onSave: (data) => {
      const updated = { ...record, ...data };
      if (schema.fields.some(([field, , type]) => field === "amount" && type === "number")) updated.amount = Number(updated.amount || 0);
      // Asignar owner automático si es nuevo candidato
      if (key === "candidates" && !updated.owner) {
        updated.owner = currentUser ? currentUser.name : 'Santi';
      }
      // Attach pending CV file if uploaded
      if (key === "candidates" && window._pendingCV) {
        if (!updated.files) updated.files = {};
        updated.files.cv = window._pendingCV;
        updated.cv = window._pendingCV.name;
        window._pendingCV = null;
      }
      const index = state[key].findIndex((item) => item.id === id);
      if (index >= 0) state[key][index] = updated;
      else state[key].push(updated);
      // Schedule notification for "Volver a contactar"
      if (key === "candidates" && updated.contactarFecha) {
        var delay = new Date(updated.contactarFecha).getTime() - Date.now();
        if (delay > 0 && delay < 30*24*3600*1000) {
          setTimeout(function() {
            showNotification("Volver a contactar: " + updated.name, updated.contactarNotas || "");
          }, delay);
        }
      }
    },
  });
}
