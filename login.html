<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expansion People Recruiter</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#F1F5F9;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#fff;border-radius:16px;padding:40px 36px;width:360px;box-shadow:0 8px 32px rgba(10,31,92,0.12)}
    .logo{text-align:center;margin-bottom:28px}
    .subtitle{font-size:13px;color:#64748B;margin-top:8px}
    label{font-size:12px;font-weight:700;color:#374151;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
    input{width:100%;height:40px;padding:0 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;margin-bottom:14px;font-family:inherit}
    input:focus{outline:none;border-color:#2563EB}
    button{width:100%;height:42px;background:#0A1F5C;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    button:hover{background:#0d2470}
    .error{color:#EF4444;font-size:12px;margin-bottom:12px;display:none;padding:8px 12px;background:#FEE2E2;border-radius:6px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div style="font-size:22px;font-weight:800;color:#0A1F5C">Expansion People</div>
      <div class="subtitle">Accede a tu cuenta</div>
    </div>
    <label>Email</label>
    <input id="email" type="email" placeholder="tu@expansion-people.com" autocomplete="email"/>
    <label>Contraseña</label>
    <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <div id="error" class="error"></div>
    <button id="btn">Entrar</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyA5rSzIZ_TVCi1c9RWHtPqN7qLG_8PDcro",
      authDomain: "ep-hub-7c4b9.firebaseapp.com",
      projectId: "ep-hub-7c4b9"
    });

    var auth = firebase.auth();

    // Si ya está logueado, ir directo a la app
    auth.onAuthStateChanged(function(user) {
      if (user) {
        window.location.replace('index.html');
      }
    });

    document.getElementById('btn').addEventListener('click', doLogin);
    document.getElementById('pass').addEventListener('keydown', function(e){
      if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
      var email = document.getElementById('email').value.trim();
      var pass  = document.getElementById('pass').value;
      var errEl = document.getElementById('error');
      var btn   = document.getElementById('btn');

      if (!email || !pass) {
        errEl.textContent = 'Completa email y contraseña';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Entrando...';
      btn.disabled = true;
      errEl.style.display = 'none';

      auth.signInWithEmailAndPassword(email, pass)
        .then(function() {
          window.location.replace('index.html');
        })
        .catch(function(err) {
          var msg = (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password')
            ? 'Email o contraseña incorrectos'
            : err.code === 'auth/too-many-requests'
            ? 'Demasiados intentos. Espera un momento.'
            : 'Error: ' + err.message;
          errEl.textContent = msg;
          errEl.style.display = 'block';
          btn.textContent = 'Entrar';
          btn.disabled = false;
        });
    }
  </script>
</body>
</html>
